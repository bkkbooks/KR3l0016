front:
  text: 雲仙雜記卷之六
  hash: sha256:1e25e073f20d435f3b007910bd02bd0267fc6de5aac720c2d54dbdaa7396ef74
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0016_SBCK_006-1a}
body:
  text: 讀書數真珠以記于授㓜時家以綠真珠勝為簾押授讀書數真珠以記日輒一遍長安後記竹粉湯夏侯􅃏謁盧懷慎坐終日得竹粉湯一盞洛都要紀蜀中厚朴蜀中厚朴若酒後采之紫色蕩散用輒無力窮幽記碎錦坊􅀳公午橋荘有文杏百株其處立碎錦坊曹林異景百年􅁔李觀作百年歌王湜請其法觀向湜彈指曰遺子􅆶甲清塵庶幾文思有加詩源指訣夢青龍吐棊經王積薪夢青龍吐棊經九部授已其藝頓精岀棊訣白眼蜂􅁞退之後多為乾腊貨之開元中春末兩市多白眼􅉕如山市人以此卜絲帛之豐歉豊寧􅀓安石榴李漢碎胡瑪瑙盤盛送王莒曰安石榴莒見之不疑既食乃􅁴楊州事迹􅄝鴨腊彭几􅄝鴨腊未曝前三日置鎮石之下時􅀁共服蜀音録壬癸席申王謂猪既供湌不宜處扵穢處乃以氊龕粟粥待之取其毛刷净令巧工織壬癸席滑而且涼河東備録歛諸妓􅁫鈿以記意金城多美妓賀蘭劍曰吾既臨人􅀻情難展遇宴飲則歛奪諸妓􅁫鈿退以記意金城記沈秘景符禹導河之際沈秘景符以鎮五千之水患後人頼焉禹功記沙上玩味成詩栁宗元吟春水如藍詩久之不成乃取九脚床於池邊沙上玩味終日僅能成萹白氏金鎖吟詩落齒謝靈運半日吟詩百萹頓落十二齒續鐘嵘句眼緑牝鞍處士富麟翁從縣令苪通源游蘭居寺通源給以緑牝鞍幽燕記異鳳眼龍道千卜室于積玉坊編藤作鳳眼窻支床用薜茘千年根炊飯洒沈水香浸酒取山鳳髓青州雜記巨栗殻為盃鄴中産巨栗脫其殻可以為盃鄴郡名録眉分九聚朱泚眉分九聚相者告以大貴泚信之金臺録洞天缾虢國夫人就屋梁上懸鹿腸於半空筵宴則使人從屋上注酒於腸中結其端􅁒飲則解開注于盃中號洞天聖酒將軍又曰洞天缾酒中玄賜成象殿茶果金鸞故例翰林當􅈂學士春晚困則日賜成象殿茶果金鑾宻記氷雪至夏價䓁金璧長安氷雪至夏月則價䓁金璧白少傅詩名動於閭閻每需氷雪論筐取之不復償價日日如是止戈集蛙臺桂林風俗日日食蛙有来中朝為御史者朝士戲之曰汝之居非烏臺乃蛙臺也御史荅曰此非蛙名圭䖝而已然較圭䖝之奉養豈不勝於黑面郎哉黒面郎謂猪也朝士大赧而退承􅊭舊纂棄官求道丁繫自尚書􅀰叅靈度禪師棄官修道日食脱粟二升諸僧鉢水一盂夏月夜禪雖飛蚊咂食終不揺動坐夏既滿面為破爛舊相禅學録携琴就松風澗響之間叚由夫携琴就松風澗響之間曰三者皆自然之聲正合􅁼聚羊曇莭以金縷羊要之曲終不去金徽變化萹出遊必携圍棊短具王積薪每出遊必携圍棊短具畫紙為局與棊子并盛竹筒中繫于車轅馬鬛間道上雖遇匹夫亦與對手勝則徵餅餌牛酒取飽而去棊天洞覽墨難减者萬金不換丸墨日用之一歲磨减半寸者萬金不換然至難得成老相墨􅀴收茶三䓁覺林院志崇收茶三等待客以驚雷莢自奉以萱草帶供佛以紫茸香盖最上以供佛而􅆟下以自奉也客赴茶者皆以油囊盛餘瀝以㱕蠻甌志笏囊笏架㑹昌以来宰相朝則有笏架入禁中逐門傳送至殿前朝罷則置於架上百寮則各有笏囊親吏持之常朝録徐􅈐善棊徐峰善棊叚成式􅁒盡窮其術􅈐曰子若以墨狻猊與我當使子過我十倍大唐龍髓記瞬碧侯琴荘有溶溶軒軒前皆池地也度池得回笻磴上自在􅈐藺先生日徃􅈐上採蕨蕨生九股以釀醋異常守臣取進之封􅈐曰瞬碧侯岀琴荘美事錢龍宴洛陽人有妓樂者三月三日結錢為龍為簾作錢龍宴四圍則撒真珠厚盈數寸以斑螺令妓女酌之仍各具數得􅀟者為􅁻妓乃作􅀟珠宴以勞主人又各令作􅄳緩帶以一丸餳舒之可長三尺者賞金菱角不能者罰酒粧樓記王武子好馬王武子好馬非馬不行正旦則栁葉金障泥上元則滿月韉清明則剪水鞭重午則籠嬌鞁八月中秋則玉櫳揔絡頭重陽則蟬兒􅌱春秋社則塗金鞁冬至則嘶風􅌱除日則藥王鞍每莭日則餵馬以明紗豆薔薇草馬癖記鸞手校尉錢鏐鎮吳越尊賢渇士使名畫工二三十人在㳂江號鸞手校尉伺北方士子流移来者咸寫貌以聞擇清俊福厚者用之胡岳方渡江画工以貌奏鏐見之歎曰面有銀光奇士也即時召見方鎮編年剪刀麫月兒􅅅柳公􅁠以隔風紗作龍城記及入朝名品號錦様書以進上方御剪刀麫月兒􅅅即命分賜岀字錦玄禄老子始生其母名之曰玄禄集真記大雅之文栁宗元得韓愈所寄詩先以薔薇露􅈅手薫玉㽔香後發讀曰大雅之文正當如是好事集二儀餅開元中長安物價大减両市賣二儀餅一錢數對胡􅊝炙十金一柈豐年録槐膠彈子李少㣲子女頗多每朝退於亭榭散槐膠彈子數百枚令諸小兒争取之以爲戲笑終日不倦戲已復收于篋放懐集酒神酒席之士九􅄍而不减其量者為酒神醉録九芒珠王武子以九芒珠穿為紉索編華架用之每月洗以鯉魚涎捃拾菁華石綠鏡臺張燕公有石綠鏡臺得自明川道士玄宗聞其有異取以精炭十車燒之不變乃巳􅁼聚記自課庵全子栖每為文則入自課庵一文必三草及十年之後悟其淺近必盡付扵火生􅊭凢三焚文集􅊹文玉井淵明拜火陶淵明日用銅鉢煑粥為二食具遇發火則再拜曰非有是火何以充腹淵明别傳茟封九錫薛稷為茟封九錫拜墨曹都統黒水郡王兼毛州刺史龍􅂡志墨封九錫稷又為墨封九錫拜松燕督護玄香太守兼毫州諸郡平章事是日墨吐異氣結成樓臺状鄰里来觀食久乃滅纂異記紙封九錫稷又為􅁓封九錫拜楮國公白州刺史統領萬字軍界道中郎將事略硯封九錫稷又為硯封九錫拜離石鄉侯使持莭即墨軍事長史兼鐡面尚書鳯翔退耕傳為花樹洗瘡止痛郭文在山間有石榴楊梅䓁花為樵牧所傷殆甚賣簮沽酒以澆花樹人問之曰為二子洗瘡止痛芳賢傳雲仙雜記卷之六
