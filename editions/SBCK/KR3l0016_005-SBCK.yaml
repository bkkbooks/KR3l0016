front:
  text: 雲仙雜記卷之五
  hash: sha256:2b360e674472b7f845523f9f7b49405aba40fe3786e7c004e4e640cd15588823
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0016_SBCK_005-1a}
body:
  text: 茟描窻竹影宗測樂閑靜好松竹嘗見日篩竹影上窓以茟備描之常新録糖蜜莫逆交陳昉得蜀糖輒以蜜澆之曰與蜜本莫逆交傳芳略記風月常新印宫人臂明皇開元初宫人被進御者日印選以綢繆記印于臂上文曰風月常新印畢漬以桂紅膏則水洗色不退史諱録念金輪呪敲両耳鐺服桂心丸念金輪呪則所思之人不以存没是夜必夣見之事略水晶環渡舟蕭整嘗登陸渾沙洲忽水漲不得下急呼村童折麈尾水晶環与之渡舟而過三賢典誥鳴牙餅許康年謁劉遜贈遜鳴牙餅千枚曰雖微物也助㕑中両日之費退耕傳棠棣之好李初􅈂遇與人相知則曰棠棣之好何以過此喜慶倍常叙闻録金蘭簿戴弘正每得􅁡友一人則書于編蕳焚香告祖考號為金蘭簿宣武盛事鴨卵成花向聲䏻於鐺中以手撥鴨夘成花河中記燭圍韋渉家宴使每婢執一燭四靣行立人呼為燭圍長安後記宴客典斟陳無咎宴客一客用一婢典斟必十二斟而後使滿以盡誠敬之道洛都要記金牌盈座河間王夜飲妓女謳􅁔一曲下一金牌席終金牌盈座豐盈傳聚香團楊州太守仲端畏妻不敢延客謝廷皓謁之坐久饑甚端入内袖聚香團啗之楊州事迩待闕鴛鴦社朱子春未㛰先開房室帷帳甚麗以待其事旁人謂之待闕鴛鴦社籹樓記笑春紅閬州㕘軍黄涉婢曰咲春紅死渉念之淚洒犀簾至皆損壞蜀普録二花阮文姬挿鬂用杏花陶溥公呼曰二花河東備録三鹿郡公􅀽利見為性頑獷方棠謂􅀽生已封三鹿郡公葢譏其太麄踈也幽燕記崑崘玉盞宇文卓方執崑崘玉盞聴左丞檀超髙談不覺墜地青州雜記坐間牡丹花宋旻語常帶華藻李孺安曰時方三月坐間生無數牡丹花矣鄴郡名録杜鵑喚歸石誼未娶聞杜鵑喚㱕歎曰此物催人使歸使我何所歸􅁘金臺録遇河神顧希微開成二年遇河神屈莫多曰更二千年大江所在堤㟁當崩沙九里禹功記口吻生花張祜苦吟妻孥喚之不譍以責祜祜曰吾方口吻生花豈恤汝軰白氏金鎖贈詩勝爛黄魚皇甫彚謁韓愈愈贈以詩彚退有言怒愈不為置酒愈曰豈不勝以爛黄魚待汝耶續鍾嵘句眼折筯不体山濤酒後哺啜折筯不休酒中玄防風粥白居易在翰林賜防風粥一甌剔取防風得五合餘食之口香七日金鑾宻記食蝤蛑鹿宜孫食蝤蛑炙於夀陽㼝中頓進數器止戈集羣公對雪羣公對雪尚隆之曰麫堆金井誰調湯餅吳永素曰玉滿天山難刻珮環坐間服其韵精姑􅆇記屋瓦皆鏤余宗伯屋瓦皆鏤竅穴千百雨則散如真珠用陳留瓦則堅而易􅍢三堂徃事三年不見羊角皮蕃去北而復来鄱陽食竹笋曰三年不見羊角哀矣叩頭録採星盆嵇昌蓄採星盆夏月漬果則倍冷叙聞録作剪刀姑園鐵作剪刀以苜蓿根粉養之裁衣則盡成墨界不用人手而自行搔首集左撚巾拭面陽華用左撚巾拭面倍有光彩自慶傳碑石李輔國􅁙父碑石用豆屑一千團磨瑩如紫玉碑字四面鐫葵花三百朶晉公遺語漬紙以竹梢甘露和天南星漬􅁓一宿裁之刀去如飛文房寳􅎖除夜歎老裴度除夜歎老迨曉不􅄰爐中啇陸火凡􅁆添也金門嵗莭印普賢象玄装以回􅄡􅁓印普賢象施于四衆每􅀊五䭾無餘僧園􅇣録三辰酒玄宗置麴精潭砌以銀甎泥以石粉貯三辰酒一萬車以賜當制學士䓁史諱録桑木根可作沉香想裴休得桑木根曰若作沉香想之更無異相雖對沉水香反作桑根想終不聞香氣諸相從心起也常新録皂盖能與日輪爭功韓愈刺潮州嘗暑中出張皂盖㱕而喜曰此物能與日輪争功豈細事耶傳芳略記雷門四老石王維輞川林下坐用雷門四老石燈滅則石中鑚火事略握麥芒刁字牛僧孺進士時常握麥芒刁字有繆誤隨手刪割㸃定三賢典略麒麟草元和時館閣湯飲待學士者煎麒麟草鳯翔退耕傳魚藻洞魚朝恩有洞房四壁夾安瑠璃板中貯江水及萍藻諸色蝦號魚藻洞南康記鼻出黄膠賀知章忽鼻出黄膠醫者謂飲酒之過従容録數米而食沈休文羸劣多病日數米而食􅅅不過一筯青陽記廬墓日影為之不移鄧寅廬墓墳􅁟未乾日影為之不移壠上記飼牛以天麻飯青齊間遇春耕則飼牛以天麻飯仍用錦縷繫于角上耕桑偶記髙麗絲結張均妓多麗彈琵琶曲頂上有髙麗絲結趙詩爭奪致傷二指辨音集元夜食牛肺犯天樞使梁鄴上元後忽髮變如血卜曰元夜食牛肺犯天樞巡使夜行禱謝可免影燈記菖蒲成獅子鸞鳳状僧普寂大好菖蒲房中以菖蒲種成獅子鸞鳳仙人之狀海墨微言鴨肝猪肚王縉飲酒非鴨肝猪肚筯輒不舉醉仙圖記吞花卧酒虞松方春以謂握月擔風且􅅏後日吞花卧酒不可過時曲江春宴録庭椿不染風盧携夢人贈句曰若問登庸日庭椿不染風初不觧其言後數年携拜相庭下古椿一㧣雖狂風驟雨不濕不揺鳯池編屋竅如七星鄭廣文屋室破漏自下望之竅如七星逄原記日用斗麫為糊以供緘封順宗時劉禹錫干預大􅁠門吏接書尺日數千禹錫一一報謝緑珠盆中日用麫一斗為糊以供緘封宣武盛事麫如棗核而中空揚埏游王鉷家食一物如􅀥核而中空其實麫也埏詢其法鉷笑而不言河中記雲仙雜記卷之五
