front:
  text: 雲仙雜記卷之八
  hash: sha256:937bec94a47665a91f50371c26448cad04b32486022c0625eb3cc2f141f29d16
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0016_SBCK_008-1a}
body:
  text: 八角玉升宣帝時西夷怛陁國貢八角玉升夏以水澆之則無暑冬以火迫之無寒異事甚衆逄夏記失去周字知唐必興則天初稱周方具告天冊文有吏人見大周字上有両仙童長二三寸執刀剗削斯須視之失去周字人知唐必復興􅃫池編曲江春游曲江春游之家以脂粉作紅餤竿上成􅀟挑掛夾雜畫帶前引車馬曲江春逰錄毛詩卷染油代燭倪芳飲後必有狂恠恬然不耻或以毛詩卷染油代燭醉遊徹曉醉仙圖記睂睫間常化佛清涼僧海豐苦行二十餘年人見其眉睫間常化佛千百大如黍米徃来遊行已不覺也清凉僧海好李花致富終南及廬岳出好李花両市貴侯富民以千金買種終廬有致富者耕桑偶記一物如人眼睛蕭餘上元夜於宣陽里酒盤下得一物如人眼睛其體􅁼美石光彩射人餘夜遊市肆閑置掌中每行黑闇衢巷隨身光明三尺毫末可鑒後因而飛出影燈記造笙初造笙每管中入荻根細沙一豆許遇吹時飛沙於中激揚聲愈清徹近世樂工未有知者惜夫辨音集喬敷嗜魚喬敷嗜魚而貧日向漁人貸食漁人送魚一斤則以白堊標門記之後日償價年律一終白堊盈門壠上書浮陽筍九華小民浚池得物状􅁼竹根旁有一銘曰浮陽筍太古孕舉投醬􅇲三年不盡民不識字使人讀之試以豆一斗造醬投物其中果三年不减時逄道士青陽記􅀲甲間皆出雲煙魏郡開成中大旱徧禱山岳或言西沈陸先生道行精明請之必驗太守以下乃携杏酒青羊以備牲醪告于山中先生受禮訖對太守呼吸數過五指連拂之􅀲甲間皆出雲􅃄之氣惟中指氣象甚盛先生曰郡中雨淂足諸縣皆獲八分亦可小稔已而其說不誣從容錄石魚南康有狂人周可大見魚必置數十頭食餘棄于几上人謂隨即臭腐可大以手摩之皆為石魚後年餘友人訪之見其紙裹石魚煨以啖客新香不異常魚逍遥公南康記王母惜黄中李過蟠桃西王母居龍月城城中產黄中李花開則三影結實則九影花實上皆有黄中二字王母惜之過於蟠􅊝与紫陽真官博􅃧則以一二百枚遞分勝􅀒集真記重􅀺盞酌水宣武判官洪子昇延嵩山鍊師在宅值大雨堦庭彌滿欲上堂户子昇有憂色鍊師取懷中重􅀺盞酌水不滿盃而庭砌隨已乾矣宣武盛事時元亨錬真方山道人時元亨錬真厭世三十餘年精唾涕淚俱惜之七十髮不白走如奔馬宋先生曰吾以小術令此子三日即死乃於酒中以羊豕腦一拌啖之元亨不覺也飲罷便苦頭痛下痢明日便出如剥浄鷄頭肉者二三升許又明日元亨果卒河中記孫逢年好酒色老不衰長安孫逢年日一醉無虛席妓妾曵綺羅者二百餘人晚年衰憊齒皆蚛齲空虗如樓閣而舊好不衰長安後記王維居輞川地不容塵王維居輞川宅宇既廣山林亦逺而性好温潔地不容浮塵日有十數掃􅎖者使兩童專掌縛帚而有時不給洛都要記磁石益眼益眼者無如磁石以為盆枕可老而不昬寜王宫中多用之豊寧傳魚喜鹿胎香楊州太守閭丘惠㑹僚友于轉沙亭集境内漁户令曰所得魚多者有金帛之賞有一漁人以肉物作塊散懸於網上取魚倍衆力凡十網得魚三千六百無甚小者衆慙而退太守詢之曰魚喜鹿胎之香適散懸者乃此物也下網召之萬魚畢聚矣楊州事迩降魔寺僧以名召魚東川降魔寺僧吉祥魁梧多力受飯五鉢日夜誦經九凾池中魚知其數以名召之背出水面使去即没蜀普錄并代人喜嗜麫并代人喜􅄝麫切以吳刀淘以洛酒漆斗貯之擊鼔集老㓜自以多寡取之至飽河東備錄鶴識字衛濟川養六鶴日以粥飲啖之三年識字濟川檢書皆使鶴衘取之無差金城記洗心糖茅地􅀴冬燒去枝梗至春取􅁟中餘根白如玉者搗汁煎之至甘可為洗心糖幽燕異記桃花絲青齊間有一種􅊝花盛開時垂絲至二三尺採之練以松脂遞相􅅶結織成鞋履寄徃都下人皆不辨何物青州􅄂記秘密泉甘塘社有一水方丈瑩潔春夏不竭旱則禱之應時雨下然牛馬猪羊飲之肥澤鷄鴨鵝鴈飲之必死郷民縁可以救旱號秘密泉鄴郡名錄怯夜幡胡陽白壇寺幡刹日中有影月中無影不知何故因號怯夜幡金臺記魚鼈隨世安危大禹治水功成令江淮河海神曰魚鼈衰盛隨世安危自此之後年必小减使其價遞増以食晚末之民應天意也禹功記書冊以竹漆為糊凡書冊以竹漆為糊逐葉微攤之不惟可以久存字畫兼紙不生毛百年如新此宮中法也白氏金鎖真脫絲布人之為文語意踈慢者真脫絲布文士之病莫大乎此鍾嵘句眼入酒中沐浴使毛髮識味石裕方明造酒數斛忽觧衣入其中恣沐浴而出告子弟曰吾平生飲酒恨毛髮未識其味今曰聊以設之庶無厚薄酒中玄龍口渠翰林有龍口渠通内苑大雨之後必飄諸花蕋􅀴由而出有百種香色名不可盡春月尤妙金鑾宻記口中現五色牙齒孔戣好術藝延接方士多所傳授能口中現五色牙齒彩色光絢一瞬即改止戈集李有九標蕭瑀陳叔逹於龍昌寺㸔李花相與香雅細淡潔密宜月夜宜緑髩宜白酒承􅊭􅃇纂斗盆燒乳頭香曹務光見趙州以斗盆燒乳頭香十斤曰財易得佛難求舊相禅學錄鼠精李王侍中家堂前有鼠從地出其穴即生李樹花實俱好此鼠精李也好事集猪肝中有䜟書白浦民割猪肝肝中有一紙大如手色如新書云煙蒼蒼明年無粮次年巢冦起州郡多荒纂異記酒魔常元載不飲羣僚百種强之辭以鼻聞酒氣已醉其中一人謂可用術治之即取針挑元載鼻尖出一青䖝如小蛇曰此酒魔也聞酒即畏之去此何患元載是日已飲一斗五日倍是玄山記糠市洛陽振徳坊皆貧民例享糟糠之薄賀知章目為糠市從容錄品物互徵古事房璘至人家凡閱四筵摘其品物互徵古事一一切當河中記雲仙雜記卷之八
