front:
  text: 刻雲仙雜記序梁任彦升家有書三萬卷捃拾遐怪之事為二卷曰述異记唐末時馮贄􅀁纂雲仙雜記十卷贄自序云家蔵九世之書二十餘萬卷已數倍彦升之書雖古蔵書之家當無以過之今􅀚其􅀁纂多􅀁未見贄又云若見於常常之書此必畛之信矣其事顡皆幽间燕餙述異之外􅁕以資博聞而欣然惬賞者此書也葉伯寅既乙校刻齋中􅂧屬余序遂為序云隆慶辛未夏六月俞允文撰雲􅋖雜記序
  hash: sha256:7751949089d36a23b5f0dd89b520519e57d79b7f1edaa0b0be86d9adeb688a51
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0016_SBCK_000-1a}
body:
  text: 唐金城馮贄編纂􅀋之書多矣其間􅀁載世人用于文字者亦不下數十軰則今未免為陳言也予事科舉三十年蔑然無効天祐元年退㱕故里築選書室以居取九世􅀁蓄典籍􅀴史子集二十萬八千一百二十卷六千九百餘帙其膏髓别為一書其門目未暇􅉽别也成于四年之秋由急於應文房之用乃不䏻詳又數歳復淂終萹者四部英華筆頭飛文壇戈㦸應題錄皆傳記集異之􅀃若見於常常之書者此必略之庻兵火煨燼之後成者不至求手豈小􅀘欤同志者幸為􅎇秘之天復元年十二月序雲仙􅇎記目錄卷之一幽人茟飛雲履孫豋琴棋聲與律吕相應紅白二墨龍耳李磂黄椀夢裁錦無塵子惜春御史黑松使者桞神九烈君六鼻鏡生雲烟文星典吏玄山印記水玉數珠為梨花洗粧籠桶衫柿油巾石斧銘棠木印鳯窠群女地仙圓凉物梅粧閣洛陽􅀊莭􅏧檀寺春秋二㑹㮻首問青天清髙門戸午橋荘飬硯墨茟􅁓迷香洞袖裏春金凰凰三賢松芋魁遭遇山神以豐年相報綰龍臺呉興米掃露眀軒吞雲夢澤卷之二田水聲過吾師龍􅂡友􅀮士衫俗耳鍼砭詩膓鼓吹半月􅂂菱角巾大鯉五色􅃄姿玉骨日精火筯如両儀羔羊揮淚屋龍更衣掌有卧蛇文栗木為􅀜九華半臂遷官靣長額有光􅂔壺中景辨琴秦楚聲臨光宴水松牌泛春渠百花獅子桃花􅁓酒器九品暖香滿室如春啼猿生蕨買春錢苦吟蛻龍牙碎金靣基盤琴價与武庫争先圍棋奪造化墨紋如􅂂皮換茶醒酒腸胃文章映日天􅈐煤與綾文剌孰朦粥飼鳩花簮壓損㡌􅉉翡翠指環赤将軍地脂胡麻啖犬得意田卷之三過門錢虞永興書一醉六日􅁸宅刷以醇酒題梁字郇公厨厠上以术湯盥手書北山移文争春館薛家士風食蒲桃梅聘海棠棖子臣櫻􅊝檜生藥圎過􅈦羊軟􅃮壥桑枝為籬障嚼鷄舌香䏻詩朱書禹字渡江河盡數天星知棊􅀔雌雄樹作詩如繡花化玉膏貯蘭蕙百齒梳科斗筯魚尾匙唾地成文菖蒲當拜此君界尺茟槽犀如意萱艸浣衣虎毛紅管茟一詩􅂺洗其茟句中喜得魚竹洪兒􅁓束修羊惠一絲両絲蕨成金叙鷄鴨卵殻八梭綾染花奩文享媚香無忝少延淸􅂬茟文章貨降龍道者何徴君􅀮吳郡西昌逸士享􅎷􅁏獵蝇記室租􅂼􅂇鼎爼蓄鴨卷之四石鼈銜賦題自􅀒書劍松精成使者龍窠石召客念無魚金鷄􅈽卵時胡松莭支琴􅀼嚥棊子墨染􅁓不昏茶燋􅅞奴投火袖餅班中石蓮匣鵝蒸粉指印青編一里更二馬旋風茟贈相淂以鳩物價至微夜飛蟬羲之􅀑竹枝曲却老先生小兒司命青蠅拜賀葬得石牌貧而圖婚以海鮫皮為鼓上元影燈軟􅀥餻􅀼花酒窟詩成裁囱􅁓白羊粧􅀧芳草浮萍為鴨作茵褥自為小君裁剪貴家棊子弄葫蘆成詩好讀離騷挼花浸酒挑野􅂼簇酒祭詩以酒脯碬磨齋歛衣凌虗宴桃花醋蟣肝龍首卷之五茟描窻竹影糖蜜莫逆交印宫人臂念金輪呪水晶環渡舟鳴牙餅棠棣之好金蘭簿鴨邜成花燭闈宴客典斟金牌盈座聚香􅇛待闕鴛鴦社咲春紅二花三鹿郡公崑崙玉盞坐間牡丹花杜䳌喚㱕遇河神口吻生花贈詩勝爛黄魚折筯不休防風粥食蝤蛑羣公對雪屋瓦皆鏤三年不見羊角採星盆作剪刀左撚巾拭靣碑石漬􅁓除夜歎老印普賢像三辰酒桑木根可作沉香想皂葢與日争功雷門四老石握麥芒刀字麒麟草魚藻洞鼻出黄膠數米而食廬墓日影為之不移飼牛以天麻飯髙麗絲結食牛肺犯天樞使菖蒲成獅子鸞鳯状鴨肝猪肚吞花卧酒􅒉椿不染風屋竅如七星斗麵為糊供緘封􅔇如􅀥核而中空卷之六讀書􅁆真珠為記竹粉湯蜀中厚朴碎錦坊百年􅁔夢青龍􅄍棊􅀴白眼􅉕安石㨨嗜鴨腊壬癸席歛妓􅁫鈿以記意沈秘景符沙上玩味成詩吟詩落齒綠牝鞍鳯眼窻巨栗殻為盃眉分九聚洞天缺賜成象殿茶果夏雪價䓁金壁蛙臺棄官求道携琴就松風澗響出逰携圍棊短具墨難减者萬金不換孜茶三䓁笏囊笏架徐峰善棊瞬碧侯錢龍宴王武子好馬鸞手校尉剪刀􅔇月兒􅅅玄禄大雅之文二儀餅槐膠禅子酒神九芒珠石綠鏡臺自課庵淵眀拜火筆封九錫墨封九錫􅁓封九錫硯封九􅃬為花樹洗瘡止痛卷之七元白両不相下仙人栢葉書家庖百品硯中出白影珠陳蕃待客桂人好食蝦蟇霜露䏻染紅紫蒲桃髻方囊盛金錢千眼仙人赴東林寺洛如花虱念阿房宫賦甲乙膏魚脊出金􅁫􅇛沙􅑃成睡􅄞康樂音泉石斧欲斫斷詩手清水􅀰君徐鳯儀杖劍生神芝天下晏清聚芳圖百花帶李花如飛仙􅁸藁窻上􅁡浸烏梅觧􅀫醒榕粉􅁅山􅄝蛤蜊諢衣三様錢買二色酒大筍中有眼睛雨􅀧螺磨􅁓沈休文多病畜郭璞浄眼僧竹莭中神水醸換骨膠畏薯藥分香蓮雪竹搔頭遇棊仙焚杜詩飲以膏􅁡蔵盤筵於水底七井生凉卷之八八角玉井失去周字知唐必興曲江春逰毛詩卷染油代燭眉睫間常化佛好李花致富一物如人眼睛造笙喬敷􅄝魚浮陽筍􅆶甲間皆出雲􅃄石魚王毋惜李過蟠桃重􅀺盞酌水時元亨煉真孫逄年好酒老不衰王維居不容塵磁石盖眼魚喜􅎷胎香降魔寺僧以名召魚并代人喜嗜麫鶴識字洗心糖桃花絲秘宻泉怯夜幡魚鱉隨世安危書冊以竹􅃮為糊真脫絲布酒中沐浴毛髮識味龍口渠口中現五色牙齒李有九標斗盆燒乳頭香䑕精李猪肝中有䜟書酒魔糠市品物互徴古事卷之九一盃􅅅三萬錢縑繫南山樹心織茟耕燕奴三斗爛腸金菜玉􅂼無腸公子駭鷄犀天皷虎狼稱呼鵲巣􅆩穴􅂕運􅂡沒了期㧞釘錢斧中龍黄􅁓寫􅃙金玉炊桂鷸蚌􅁵婦螳蜋􅅮輪銅鶴罇鵲尾杓麒麟楦喙長三尺手重五斤鶴鳴鷄􅀣鳩集鳯池金剛舞夜又歌金戺玉階傳座寳苗築糠三尺飜綽入水龍巢飜見李思戒一􅇍一計通神錢九花虬上清珠副急淚五花館鳥龍􅂡髯如㦸田舎翁十斛麥赤鳯凰卷之十蕤賔鐡截􅌱留鞭蜂蝶慕香自煖盃龍􅇃九色鳯鶵懐夢艸青鸐寳井瓊厨金穴流香渠書倉如願金􅐽玉膾閃電窻雲仙雜記目錄終
