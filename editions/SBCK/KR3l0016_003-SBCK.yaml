front:
  text: 雲仙雜記卷之三
  hash: sha256:b9dcea57997b7d72d9a79480f105c643df6cbb7f490e57dc9ef48a6a55a93459
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0016_SBCK_003-1a}
body:
  text: 過門錢龍山康甫慷慨不羈每日置酒於門邀留賔客不住者贈過門錢日費酒者鶴觜缾二十放懐集虞永興書有人收得虞永興與圓機書一紙剪開字字賣之礬郷一字得麻一斗鶴口一字得銅硯一枚房村一字得芋千頭隨人好之淺深字錦一醉六日張麟一醉六日嚙柱幾半醉録起宅刷以醇酒蓮花巷王􅃢起宅畢其門刷以醇酒更散香末盖禮神之至宣武盛事題梁字范溥題聽事梁每字以木花蓮承之歲旦一開次日復上之河中記郇公厨韋陟㕑中飲食之香錯雜人入其中多飽飫而㱕語曰人欲不飯筋骨舒寅縁須入郇公㕑長安後記厠上以术湯盥手陳宛盛其居止厠上以术湯盥手槐板覆蔽糞穴為都城苐一洛陽要記書此山移文樂天女金鑾十歲忽書北山移文示家人樂天方買終南紫石欲開文士傳遂輟以勒之豊寧傳争春館楊州太守圃中有杏花數十畷每至爛開張大宴一株令一倡倚其傍立館曰爭春開元中宴罷夜闌人􅂉云花有歎聲楊州事迩薛家士風成都薛氏家士風甚美㕑司以半瓠為杓子孫就食蝦羮肉臠一取之飯再取之蜀普録食蒲桃楊炎食蒲桃曰汝若不澁當以太原尹相授河東備録梅聘海棠棖子臣櫻桃黎舉常云欲令梅聘海棠棖子臣櫻桃及以芥嫁笋但恨時不同耳然牡丹酴醿楊梅枇杷幸為執友金城記檜生藥圓幽燕思仙驛後有五樹檜忽生藥圓試摘服之徃徃療疾有驗幽燕記異過㕔羊熊飜每㑹客至酒半堦前旋殺羊令衆客自割隨所好者綵綿繫之記􅃅畢烝之各自認取以剛竹刀切食一時盛行􅃅過㕔羊青州􅇎記軟漆􅅶桑枝為籬障杜勝宅以軟漆􅅶桑枝編為籬障雨一過黑光照四面時通甫愛之欲以銅官苐取不應鄴郡名録嚼鷄舌香飲酒者嚼鷄舌香則量廣浸半天回則不醉酒中玄能詩能詩之士雨泡滅則淂意香􅃄斷而成冷白氏金鎻朱書禹字渡江河渡江河者朱書禹字佩之免風濤保安吉禹功記盡數天星徧知棊勢人能盡數天星則徧知棊勢止戈集雌雄樹九仙殿銀井有梨二株枝葉交結宫中呼爲雌雄樹金鑾宻記作詩如繡花作詩如繡花女令龍絡枝葉而已無過不及乃善鍾嵘句眼化玉膏衛玠盥靣用化玉膏及芹泥故色愈明潤終不枯槁金臺録貯蘭蕙玉維以黄磁斗貯蘭蕙養以綺石累年彌盛汗漫録百齒梳孫思邈以交加木造百齒梳用之養生要法也樵人直説科斗筯魚尾匙向範待客有漆花盤科斗筯魚尾匙樞要録唾地成文有人謁李賀見其久而不言唾地者三俄而成文三萹文茟􅁭喉菖蒲當拜此君王徽之以菖蒲映竹曰菖蒲止以九莭為貴而此君面目聳然正當再拜此君而此君亦安得不受之耶高士春秋界尺茟槽有借界尺筆槽而破其槽者白其主人曰韓􅈂木如常􅀌竹君無恙但半靣之交忽然折莭矣主人大笑玉塵集犀如意虞世南以犀如意􅐡癢乆之歎曰妨吾聲律半工夫缾餘事萱草浣衣鄭源令婢萱艸浣衣萱草輒云郎君塵􅁟太多令人手皮俱脫三􅈐集乕毛紅管茟有僦馬生甚貧遇人与乕毛紅管筆一枚曰􅀁須但呵茟即得之然夫妻之外令一人知則殆矣時方盛行凝􅃄帳風篁扇皆呵而淂之一日晚思兎頭􅅅連呵遽得數盤夫妻不能盡以與鄰家自是茟雖存呵之無應纂異記一詩輒洗其茟白􅀓每一詩輒洗其筆文覽句中喜得魚竹孟浩然一日周旋竹間喜色可掬又見網師得魚尤甚喜躍友人問之荅云吾適得句中有魚竹二物不知竹有幾莭魚有幾鱗疑致踈謬今見二物乃釋然矣玄山記洪兒紙姜澄十歳時父苦無紙澄乃燒糠恊竹為之以供父澄小字洪兒鄉人􅃅洪兒紙童子通神録束􅁱羊倪若水藏書甚多列架不足疊牕安置不見天日子弟􅈂日㸔書借書者先投束修羊唐餘録惠一絲両絲杜甫寓蜀每􅁞熟即與兒躬行而乞曰如或相憫惠我一絲両絲浣花旅地志蕨成金釵王鯨逢賣蕨姥黄衣破結有饑色憫之乃以千錢買蕨姥謝而去及㱕烝于烏頭甑盡成金釵盖姥非常人也清異志鷄鴨卵殻張寳嘗使子弟廵市乞鷄鴨卵殻鷄卵以煮藥鴨卵以金絲縷海棠花名鮫胎盞醉後畏酒時多用之就印録八梭綾鄴中老母村人織綾必三交五結號八梭綾匹􅈂米陸筐摭拾精華染花奩郭代公愛姬薛氏貯食物以散風奩􅀵粧具以染花奩品物類聚記文享媚香無忝張說携麗正文章謁友生時正行宫中媚香號化樓臺友生焚以待說說出文置香上曰吾文享是香無忝徴文玉井少延清歡陶淵明得太守送酒多以舂秫水雜投之曰少延清􅂬數日淵明别傳筆文章貨羅􅀮喜茟工萇鳳語之曰茟文章貨也吾以一物助子取髙價即贈鴈頭牋百幅士夫聞之懷金同價􅂉以綵羅大組換之龍􅂡志降龍道者戴顒見降龍道者曰生死外人願陳三拜獻護􅀴簾青銅磬芳賢傳何徵君􅀮呉郡何徵君􅀮吳郡多遊臨華寺九金堂飲鹿塘靈寳院􅆂星澗高􅀮外書西昌逸士􅀰詠􅀮西昌採樵為業或擔至都中人買之則曰我西昌逸士酒中人也今獻公所闕公當惠我所好廬陵記享鹿肉黄昇日享鹿肉三斤自晨煑至日影下門西則喜曰火候足矣如是四十年安成記獵蝇記室盧記室多作脯腊夏則委人於十歩内扇上塗餳以擈蝇脯以青紗障隔塵􅁟時人呼為獵蝇記室金溪記種􅂼助􅂦爼宋宇種蔬三十品時雨之後按行園圃曰天茁此徒助予􅂦爼家復何患䂊章記蓄鴨富􅀭庭蓄鴨萬􅃗每飼以米五石遺毛覆渚桂林記雲仙􅇎記卷之三
