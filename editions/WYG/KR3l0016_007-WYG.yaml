body:
  text: 雲仙雜記卷七唐馮贄撰元白兩不相下元微之白樂天兩不相下一日同詠李花微之先成曰葦綃開萬朶樂天乃服綃練也葦白而綃輕髙𨼆外書仙人栢葉書郭天民巧思横生能摺書簡反覆如栢葉状鄉人謂之仙人栢葉書安成記家庖百品張元厚家庖百品日日不變有蔡機缸二千盛貯皆滿梁福廬陵記硯中出白影珠侯道昌因雨置龜頭硯於簷下承溜以滌之俄而滴破硯硯中出白影珠十顆有患目者煑珠水洗之皆愈馮正雲金谿記陳蕃待客陳蕃待客拌飯以鹿脯芼羮以牛脯未嘗别為異饌董慎續豫章記桂人好食蝦蟆桂人好食蝦蟆仍重乾菌為糁赴食者至以餘爼包歸遺兒女雖汚衫不恥張洞林桂林志霜露能染紅紫鵝管山霜可染紫白庻潭露能染紅為天下冠恨人無知者常奉真湘潭記蒲桃髻小兒髮初生為小髻十數其父母為兒女相勝之辭曰蒲桃髻十穗勝五穗李明之衡山記方囊盛金錢富人賈三折夜以方囊盛金錢於腰間微行市中買酒呼秦聲女置宴方德逺金陵記千眼仙人赴東林寺廬山逺法師命盡之日山中峯澗寺落皆見千眼仙人成隊執幡幢香花赴東林寺法師死乃止十三賢共注廬山記洛如花吳興山中有一樹𩔖竹而有實似莢状鄉人見之以問陸澄澄曰名洛如花郡有文士則生張寳就印錄虱念阿房宫賦揚州蘇𨼆夜卧聞被下有數人齊念阿房宫賦聲緊而小急開被視之無他物惟得虱十餘其大如豆殺之即止清異志甲乙膏蜀人二月好以豉雜黄牛肉為甲乙膏非尊親厚知不得而預其家小兒三年一享浣花旅地志魚脊出金釵寳厯中酉陽人見釣魚師有魚腦貫黄文愛而買歸食至脊上出金釵一􅃗長六寸唐餘錄團沙揑成睡嵇康房琯少時曽至洲渚上團沙揑成睡嵇康甚有標態見者多愛之童子通神録樂音泉强村有水方寸許人欲取之唱浪淘沙一曲即得一杯味大甘冷村人因名曰樂音泉𤣥山記石斧欲斫斷詩手杜甫子宗武以詩示阮兵曹兵曹荅以石斧一具隨使并詩還之宗武曰斧父斤也兵曹使我呈父加斤削也俄而阮聞之曰誤矣欲子斫斷其手此手若存天下詩名又在杜家矣文覽清水郎君司馬伯殊買得鴨卵一枚非常珍重夜猶未食夢曰此卵乃徐龍幼子清水郎君也不殺將富殊乃放之三峯集徐鳳儀杖徐鳳儀有一杖直如筆管其後每年生一節二十年每年縮一節三月則杖之四面青赤白黑各開一花不知何木也陶家缾餘事劒生神芝則天下晏清成都朱善存家世寳一劍每生神芝則天下晏清如安史黄巢之亂劍皆吐黑烟屬天不差毫釐玉塵集聚芳圖百花帶宗測春遊山谷見奇花異草則繫于帶上歸而圖其形状名聚芳圖百花帶人多效之髙士春秋李花如飛仙伍貫卿居沅陵家有李花一株月夜奴婢遥見花作數團如飛仙状上天去花上露水倐然作雨數千㸃花則亡矣樞要録起藁窻上江揔為文次至吟咏得意則起藁於窻上不堪示則投置溷中乆而文遂工矣文筆襟喉蜜浸烏梅解宿酲陳永陽王宿酲未解則為蜜浸烏梅每啖不下二十枚清醒乃已樵人直説榕粉小兒瘡痂以榕粉日傅之則易瘥而無痕汗漫錄灰山無棣有灰山山南有石竅其中二麥無數取之不竭三賢典畧嗜蛤蜊吐突承璀嗜蛤蜊炙以鐵絲牀數澆鹿角漿然後食傳芳畧記諢衣穆宗以𤣥綃白書素紗墨書為衣服賜承幸宫人皆淫鄙之詞時號諢衣至廣明中猶有存者史諱録三様錢買二色酒西門季𤣥造二色酒白酒中有黒花斟於器中花亦不散其中有肝石故也崔道旅以金銀銅錢來酤曰以我三様錢買君二色酒欲辭得乎常新録大筍中有眼睛裴晉公於藍田得一大筍破之有三四眼睛而香美過甚乃與曾序分食之晉公遺語雨㸃螺磨紙治紙之昬而不染墨者用雨㸃螺磨紙左右三千下其病去矣文房寶飾沈休文多病沈休文多病六月猶綿帽温爐食薑椒飯不爾則委頓自慶集盲郭璞路巖幼病有人稱善醫禳之術巖用之不效歎曰此盲郭璞也搔首集浄眼僧𫝊法寺浄眼僧能用藥煮烏頭施人治百疾皆驗又以􅁾跡呪治痁破鐵城偈除鬼祟發無不㨗僧園逸録竹節中神水重午日午時有雨則急斫一竿竹竹節中必有神水瀝取和獺肝為圓治心腹塊聚等病金門嵗節釀換骨醪憲宗采鳳李花釀換骨醪晉國公平淮西囘黃帊金缾賜二斗叙聞録畏薯藥李輔國大畏薯藥或人因以示之必眼中火出毛髪皆瀝血因致大病叩頭録分香蓮三堂使宅有鈎仙池一種蓮子一嵗再結實子十隻其花時香兼桃梅萸菊郡人傳分香蓮不論錢三堂往事雪竹搔頭趙綸妻死遺雪竹搔頭於堦下不數日化為楊梅花朶如撒時人異之姑􅆇前後記遇棊僊卞子京遇棊僊束帶拜金鑄紫堂仙仍坐於席上勝克之利萬不失一手參棊訣焚杜甫詩飲以膏蜜張籍取杜甫詩一帙焚取灰燼副以膏蜜頻飲之曰令吾肝腸從此改易詩源指訣藏盤筵於水底白氏履道里宅有池水可泛舟樂天每命賓客繞船以百十油囊懸酒炙沉水中隨船而行一物盡則左右又進之藏盤筵於水底也窮幽記七井生凉霍仙鳴别墅在龍門一室之中開七井皆以雕鏤木盤覆之夏月坐其上七井生涼不知暑氣雲林異景志雲仙雜記卷七
