body:
  text: 雲仙雜記卷六唐馮贄撰讀書數真珠以記于授幼時家以綠真珠勝為簾押授讀書數真珠以記日輒一遍長安後記竹粉湯夏侯鉞謁盧懷慎坐終日得竹粉湯一盞洛都要紀蜀中厚朴蜀中厚朴若酒後采之紫色蕩散用輒無力窮幽記碎錦坊晉公午橋荘有文杏百株其處立碎錦坊曹林異景百年歌李觀作百年歌王湜請其法觀向湜彈指曰遺子爪甲清塵庶幾文思有加詩源指訣夢青龍吐棊經王積薪夢青龍吐棊經九部授已其藝頓精棊訣白眼蜂􅁞退之後多為乾腊貨之開元中春末兩市多白眼蜂如山市人以此卜絲帛之豐歉豐寜傳安石榴李漢碎胡瑪瑙盤盛送王莒曰安石榴莒見之不疑既食乃覺揚州事迹嗜鴨腊彭几嗜鴨腊未曝前三日置鎮石之下時所共服蜀普錄壬癸席申王謂猪既供飡不宜處於穢處乃以氊龕粟粥待之取其毛刷净令巧工織壬癸席滑而且涼河東備錄斂諸妓釵鈿以記意金城多美妓賀蘭劍曰吾既臨人私情難展遇宴飲則斂奪諸妓釵鈿退以記意金城記沈秘景符禹導河之際沈秘景符以鎮五千之水患後人賴焉禹功記沙上玩味成詩栁宗元吟春水如藍詩久之不成乃取九脚床於池邊沙上玩味終日僅能成篇白氏金鎖吟詩落齒謝靈運半日吟詩百篇頓落十二齒續鍾嶸句眼綠牝鞍處士富麟翁從縣令芮通源游蘭居寺通源給以綠牝鞍幽燕記異鳳眼窗龍道千卜室于積玉坊編藤作鳳眼窻支床用薜茘千年桃炊飯洒沈水香浸酒取山鳳髓青州雜記巨栗殻為盃鄴中產巨栗脫其殻可以為盃鄴郡名錄眉分九聚朱泚眉分九聚相者告以大貴泚信之金臺錄洞天缾虢國夫人就屋梁上懸鹿腸於半空筵宴則使人從屋上注酒於腸中結其端欲飲則解開注于盃中號洞天聖酒將軍又曰洞天缾酒中𤣥賜成𧰼殿茶果金鑾故例翰林當直學士春晚困則日賜成象殿茶果金鑾密記氷雪至夏價等金璧長安氷雪至夏月則價等金璧白少傅詩名動於閭閻每需氷雪論筐取之不復償價日日如是止戈集蛙臺桂林風俗日日食蛙有來中朝為御史者朝士戲之曰汝之居非烏臺乃蛙臺也御史荅曰此非蛙名圭虫而已然較圭虫之奉養豈不勝於黑面郎哉黒面郎謂猪也朝士大赧而退承平舊纂棄官求道丁繫自尚書郎叅靈度禪師棄官修道日食脱粟二升諸僧鉢水一盂夏月夜禪雖飛蚊咂食終不揺動坐夏既滿面為破爛舊相禪學錄携琴就松風澗響之間段由夫携琴就松風澗響之間曰三者皆自然之聲正合𩔖聚羊曇節以金縷羊要之曲終不去金徽變化篇出遊必携圍棊短具王積薪每出遊必携圍棊短具畫紙為局與棊子并盛竹筒中繫于車轅馬鬛間道上雖遇匹夫亦與對手勝則徵餅餌牛酒取飽而去棊天洞覽墨難減者萬金不換丸墨日用之一歲磨减半寸者萬金不換然至難得成老相墨經收茶三等覺林院志崇收茶三等待客以驚雷莢自奉以萱草帶供佛以紫茸香葢最上以供佛而最下以自奉也客赴茶者皆以油囊盛餘瀝以歸蠻甌志笏囊笏架㑹昌以來宰相朝則有笏架入禁中逐門傳送至殿前朝罷則置於架上百寮則各有笏囊親吏持之常朝錄徐峯善棊徐峯善棊段成式欲盡窮其術峯曰子若以墨狻猊與我當使子過我十倍大唐龍髓記瞬碧侯琴荘有溶溶軒軒前皆池地也度池得回笻磴上自在峯藺先生日往峯上採蕨蕨生九股以釀醋異常守臣取進之封峯曰瞬碧侯琴莊美事錢龍宴洛陽人有妓樂者三月三日結錢為龍為簾作錢龍宴四圍則撒真珠厚盈數寸以斑螺令妓女酌之仍各具數得雙者為吉妓乃作雙珠宴以勞主人又各令作餳緩帶以一丸餳舒之可長三尺者賞金菱角不能者罰酒粧樓記王武子好馬王武子好馬非馬不行正旦則栁葉金障泥上元則滿月韉清明則剪水鞭重午則籠嬌鞁八月中秋則玉瓏􅋛絡頭重陽則蟬兒􅌱春秋社則塗金鞁冬至則嘶風􅌱除日則藥王鞍每節日則餵馬以明紗豆薔薇草馬癖記鸞手校尉錢鏐鎮吳越尊賢渇士使名畫工二三十人在沿江號鸞手校尉伺北方士子流移來者咸寫貌以聞擇清俊福厚者用之胡岳方渡江畫工以貌奏鏐見之歎曰面有銀光奇士也即時召見方鎮編年剪刀麫月兒羮柳公權以隔風紗作龍城記及入朝名品號錦様書以進上方御剪刀麫月兒羮即命分賜字錦𤣥禄老子始生其母名之曰𤣥禄集真記大雅之文栁宗元得韓愈所寄詩先以薔薇露盥手薫玉㽔香後發讀曰大雅之文正當如是好事集二儀餅開元中長安物價大减兩市賣二儀餅一錢數對胡桃炙十錢一柈豐年錄槐膠彈子李少㣲子女頗多每朝退於亭榭散槐膠彈子數百枚令諸小兒争取之以為戲笑終日不倦戲已復收于篋放懷集酒神酒席之上九吐而不减其量者為酒神醉錄九芒珠王武子以九芒珠穿為紉索編華架用之每月洗以鯉魚涎捃拾菁華石綠鏡臺張燕公有石綠鏡臺得自明川道士𤣥宗聞其有異取以精炭十車燒之不變乃已𩔖聚記自課庵全子栖每為文則入自課庵一文必三草及十年之後悟其淺近必盡付於火生平凡三焚文集徵文玉井淵明拜火陶淵明日用銅鉢煑粥為二食具遇發火則再拜曰非有是火何以充腹淵明别傳筆封九錫薛稷為筆封九錫拜墨曹都統黒水郡王兼毛州刺史龍􅂡志墨封九錫稷又為墨封九錫拜松燕督䕶𤣥香太守兼毫州諸郡平章事是日墨吐異氣結成樓臺状鄰里來觀食久乃滅纂異記紙封九錫稷又為紙封九錫拜楮國公白州刺史統領萬字軍界道中郎將事畧硯封九錫稷又為硯封九錫拜離石鄉侯使持節即墨軍事長史兼鐡面尚書鳳翔退耕傳為花樹洗瘡止痛郭文在山間有石榴楊梅等花為樵牧所傷殆甚賣簮沽酒以澆花樹人問之曰為二子洗瘡止痛芳賢傳雲仙雜記卷六
