body:
  text: 雲仙雜記卷二唐馮贄撰田水聲過吾師丈人淵明嘗聞田水聲倚杖久聽歎曰秫稻已秀翠色染人時剖胷襟一洗荆􅁄此水過吾師丈人矣淵明别傳龍􅂡友郄詵射策第一再拜其筆曰龍􅂡友使我至此後有貴人遺金龜并拔蘂石簪咸與弟子曰可市筆三百管退而藏之貯以文錦一千年後猶當令子孫以名香禮之龍􅂡志𨼆士衫成芳𨼆麥林山剥苧織布為短襴寛袖之衣著以酤酒自稱𨼆士衫梁福廬陵記俗耳鍼砭詩腸鼓吹戴顒春携雙柑斗酒人問何之曰往聽黄鸝聲此俗耳鍼砭詩腸鼓吹汝知之乎髙𨼆外書半月履趙廷芝安成人嘗作半月履乃裁千紋布為之更托以精銀縝以綘蠟唐輔明過之因奪取以貯酒已乃自飲廷芝問之輔明笑曰公器皿太微此履有滄海之積耳妙豐居士安成記菱角巾王鄰𨼆西山頂菱角巾又嘗就人買菱脱頂巾貯之嘗未遇而歎曰此巾名實相副矣董愼續豫章記大鯉五色孫願夜行横塘見池中大魚映月吸水移時不去池外數歩有一小坎正涵北斗有蝦蟇數十共來飲啜願異之明日汰池中惟有一大鯉身已五色復來坎所訪求蝦蟇得三足者數十馮玉雲金溪記烟姿玉骨𡊮豐居宅後有六株梅開時為鄰屋烟氣所爍屋乃貧人所寄豐即塗泥塞竈張幕蔽風久之拆去其屋歎曰烟姿玉骨世外佳人但恨無傾城笑耳即使妓秋蟾出比之乃云可與比驅争先然脂粉之徒正當在後張洞林桂林志日精陸展郎中見楊梅歎曰此果恐是日精然若無蜂兒採香誰勝難和之味即以竹絲籃貯千枚并茶花蜜送衡山道士常奉真湘潭記火筯如兩儀朱符謂火筯如兩儀成變化不可缺一本明大師在坐曰當以玉為之貴能不熱李明之衡山記羔羊揮淚程皓以鐵床熁肉肥膏見火則油焰淋漓皓戯言曰羔羊揮淚矣又云我以三十萬錢償鐵匠而得此奉養豈不太過方德逺金陵記屋龍更衣饒子卿𨼆廬山康王谷無瓦屋代以茅茨每年一易茅謂之屋龍更衣或時雨溼致漏則以油幄承梁坐於其下初不愁歎十三賢共注廬山記掌有卧蛇文傅咸掌有卧蛇文指甲上𨼆起花草如雕刻是以文章過人逍遥公南康記栗木為闗凡門以栗木為闗者夜可以逺盗從容録九華半臂關文衍為散騎常侍畫九華山圖於白綾半臂號九華半臂自云令吾此身常在雲泉之内時逢青陽記􅁶官面長額有光氣郭汾陽每􅁶官則面長二寸額有光氣事已乃復隴王書壺中景石崇砌上就苔蘚刻成百花飾以金玉曰壺中之景不過如是耕桑偶記辨琴秦楚聲李龜年至岐王宅聞琴聲曰此秦聲良久又曰此楚聲主人入問之則前彈者隴西沈妍也後彈者揚州薛滿二妓大服乃贈之破紅綃蟾酥麨龜年自負强取妍秦音琵琶捍撥而去辨音集臨光宴正月十五夜𤣥宗於常春殿張臨光宴白鷺轉花黄龍吐水金鳬銀燕浮光洞攅星閣皆燈也奏月分光曲又撒閩江錦茘支千萬顆令宫人争拾多者賞以紅圏帔緑暈衫影燈記水松牌李白遊慈恩寺寺僧用水松牌刷以吳膠粉捧乞新詩白為題訖僧獻𤣥沙鉢緑英梅檀香筆格蘭縑袴紫瓊霜海墨微言泛春渠汝陽王璡取雲夢石甃泛春渠以蓄酒作金銀龜魚浮沉其中為酌酒具自稱釀王兼麴部尚書醉仙圖記百花獅子曲江貴家遊賞則剪百花装成獅子相送遺獅子有小連環欲送則以蜀錦流蘇牽之唱曰春光且莫去留與醉人看曲江春宴録桃花紙楊炎在中書後閣糊窻用桃花紙塗以氷油取其明甚鳳池編酒器九品李適之有酒器九品蓬萊盞海川螺舞仙盞瓠子卮幔捲荷金蕉葉玉蟾兒醉劉伶東溟様蓬萊盞上有山象三島注酒以山沒為限舞仙盞有闗捩酒滿則仙人出舞瑞香毬子落盞外逢原記暖香滿室如春寳雲溪有僧舎盛冬若客至不燃薪火暖香一炷滿室如春人歸更取餘燼雲林異景志啼猿生蕨猿啼之地蕨乃多有每啼一聲遽生萬莖窮幽記買春錢進士不第者親知供酒肉費號買春錢承平舊纂苦吟孟浩然眉毫一作毛盡落裴祐袖手衣袖至穿王維至走入醋甕皆苦吟者也詩源指訣蛻龍牙取蛻龍牙一枚手握之臨局自然機變横出手參棊訣碎金面棋盤蘇尚書八十猶參禪大溈訪之以手拍碎金面棋盤尚書尋有悟解舊相禪學録琴價與武庫争先嵇康抱琴訪山濤濤醉欲剖琴康曰吾賣東陽舊業以得琴乞尚書令河輪珮玉截為徽貨所衣玉簾中單買縮絲為囊論其價與武庫争先汝欲剖之吾從死矣金徽變化篇圍棋奪造化王勃圍棋率下四子成一首詩勃猶詫之向人曰吾材奪造化雖一時之間百用亦可棋天洞覽墨紋如履皮墨紋如履皮磨之有油暈者一兩可染三萬筆成老伯墨經換茶醒酒樂天方入闗劉禹錫正病酒禹錫乃餽菊苗韲蘆菔鮓換取樂天六班茶二囊以醒酒蠻甌志腸胃文章映日元稹為翰林承㫖朝退行鐘廊時初日映九英梅隙光射稹有氣勃勃然百僚望之曰豈腸胃文章映日可見乎常朝録天峯煤與綾文刺孰勝盧杞與馮盛相遇於道各携一囊杞發盛囊有墨一枚杞大笑盛正色曰天峯煤和針魚腦入金溪子手中録離騷古本比公日提綾文刺三百為名利奴顧當孰勝已而捜杞囊果是三百刺大唐龍髓記粥飼鳩藺先生坐琴莊食蘭香粥有鳩至堦上先生以匙擲飼之漸進至肩遂盡此粥後日鳩以千百至先生皆飼之琴莊美事花簪壓損帽簷梁緒梨花時折花簪之壓損帽簷至頭不能舉祥雲志翡翠指環何充妓於後閣以翡翠指環換刺繡筆充知歎曰此物洞仙與吾欲保長年之好乃令蒼頭急以蜻蜓幔贖之粧樓記赤將軍哥舒翰有馬曰赤將軍翰愛之甚常以朝章加其背曰過吾北林兒逺矣此駿材也馬癖記地脂髙展為幷門判官一日見砌間沫出以手撮之試塗一老吏面上皺皮頓改如少年色展以謂必神藥問承天道士荅曰此名地脂食之不死展乃發甎已無所覩方鎮編年胡麻啖犬以胡麻麨啖犬則光黑而駿使獵必大獲狐兎又可得三十歳好事集得意田雲陽段氏値豐年則盡取金錢埋之九里皆滿曰有得意田遂可棄無用金豐年録雲仙雜記卷二
