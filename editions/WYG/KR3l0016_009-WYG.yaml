body:
  text: 雲仙雜記卷九唐馮贄撰一杯羮三萬錢李徳裕奢侈每食一杯羮其費約錢三萬雜珠玉寳貝雄黄朱砂煎汁為之過三煎即棄其滓博異志縑繫南山樹明皇問富人王元寳家財多少對曰請以一縑繫陛下南山樹南山樹盡臣縑未窮同上心織筆耕翰林盛事云王勃所至請託為文金帛豐積人謂心織筆耕北里志燕奴有術士於腕間出彈子二丸皆五色叱令變化即化雙燕飛騰名燕奴又令變即化二小劍交擊須臾復為丸入腕中洞微志三斗爛腸殷洪逺云周旦腹中有三斗爛腸金樓子金菜玉蔬始皇遣徐福入海求金菜玉蔬并一寸椹同上無腸公子蟹曰無腸公子龜曰先知君缺駭雞犀通天犀中有白紋如絲者置米其上以飼雞雞見驚走名駭雞犀刻為魚形持入水水輒開抱朴子天皷雷曰天皷雷神曰雷公同上虎狼麋鹿狐鼠稱呼山中寅日稱虞吏者虎也稱當路君者狼也稱東王父者麋也西王母者鹿也成陽公者狐也社君者鼠也同上鵲巢獺穴鵲巢知風之所起獺穴知水之髙下暉日知晏鴆鳥也隂諧知雨鳩也淮南子靈運鬚謝靈運美鬚臨刑施南海祗洹寺為維摩詰鬚寺中寳惜中宗時安樂公主五日鬭百草遣人取之仍剪棄其餘國史纂異没了期錢鏐封吳越王工役大興士卒嗟怨或夜書府門曰沒了期沒了期修城纔了又開池鏐出見之命吏書曰沒了期沒了期春衣纔了又冬衣嗟怨頓息五代史補拔釘錢趙在禮在宋州所為不法百姓苦之一日制下移鎮永興百姓相賀曰眼中拔却釘矣可不快哉在禮聞之上表乞還鎮朝廷許之在禮每口率錢一千號拔釘錢遂獲百萬同上釜中龍南唐時有蒼頭持龍水圖來貨或得之將練為衣忽釜中雲蒸起見二龍騰躍穿壁而去同上黄紙寫勑貞觀中太宗詔用麻紙寫勑詔髙宗以白紙多蟲蛀尚書省頒下州縣並用黄紙缺食玉炊桂蘇秦之楚三日乃得見王辭行王曰曽不少留對曰楚國食貴於玉薪貴於桂謁者難得見如鬼王難得見如天帝臣食玉炊桂因鬼見帝王曰聞命矣戰國策鷸蚌趙旦伐燕蘓代為燕謂恵王曰臣過易水蚌方出曝而鷸啄其肉蚌合而箝其啄鷸曰今日不雨明日不雨即有死蚌蚌曰今日不出明日不出必有死鷸兩不相舎漁者得而并之同上嫠婦魯人有獨處室者隣之嫠婦寡婦也亦獨處夜暴風雨嫠婦室壞趨而託焉魯人閉户曰男女不六十不同居今子幼吾亦幼是以不敢納婦曰何不學栁下惠煦嫗不逮門之女魯人曰下惠則可吾固不可吾將以吾之不可學下惠之可孔子家語螳螂搏輪齊荘公出獵有螳螂舉足將搏其輪御曰此蟲知進而不知退不量力而輕就敵荘公曰以為人必為天下勇士矣於是迴車而避之而勇士歸之同上銅鶴樽韓王元嘉有一銅鶴樽背上注酒則一足倚滿則正不滿則傾側朝野僉載鵲尾杓陳思王有鵲尾杓柄長而直置之酒樽凡王欲勸飲者呼之則尾指其人同上麒麟楦唐楊炯每呼朝士為麒麟楦或問之曰今假弄麒麟者必脩飾其形覆之驢上宛然異物及去其皮還是驢耳無徳而朱紫何以異是同上喙長三尺手重五斤陸餘慶為洛州長史善論事而繆於决判時嘲之曰說事即喙長三尺判事則手重五斤同上鶴鳴雞樹鳳閣侍郎杜景儉文章知識並髙逺時號鶴鳴雞樹同上鳩集鳳池王及善才行庸猥為内史號鳩集鳳池同上金剛舞夜义歌隋諸葛昂髙瓉争為豪侈昻屈瓉串長八赤餅濶丈餘餤麄如柱酒行自作金剛舞以送之瓉復屈昻以車行酒馬行肉碓斬鱠碾蒜虀自唱夜叉歌以送之其角勝如此同上金戺玉階明光殿金玉珠璣為簾箔金戺玉階晝夜光明在桂宫中三輔黄圖傳座長安風俗元日以後遞飲食相邀號傳座南部新書寳苖山中有葱下必有銀有薤下必有金有薑下必有銅錫山中有玉者木旁枝下垂謂之寳苖缺築糠三尺新羅人泛海漂墮鬼國鬼執之曰汝能與我築糠三尺乎汝欲鼻長一丈乎其人請築乆不成乃為鬼拔其鼻如象酉陽雜爼翻綽入水𤣥宗嘗令左右提翻綽入池水中復出曰向見屈原笑臣爾遭逢聖明何亦至此同上龍巢飜夷陵江或浮大木蔽塞水面土人謂之龍巢翻北夢瑣言見李思戒明宗不豫馮道入問因指果實曰如食桃不康他日見李思戒同上一歩一計李克用入魏博覘之城上有旗幟來往晉王曰劉鄩一歩一計更令審探果縛芻為人縛旗於上以驢負之循城而行鄩軍遁已二日矣同上通神錢張延賞判度支有獄頗寃濫公召吏嚴戒旬日須了明日案上有小帖子曰錢三萬貫乞不問此獄公怒更促之明日帖子云五萬貫公亦怒明日復見帖子曰錢十萬貫遂止不問所親問之公曰錢至十萬通神矣無不可為之事吾懼及禍不得不止也幽閑皷吹九花虬代宗時范陽貢馬額髙九寸真虬龍也身被五花紋號九花虬後以賜郭子儀杜陽雜編上清珠開元初罽賔國王貢上清珠光照一室有仙人玉女雲鶴揺動其中有水旱兵革之災䖍視無不應驗同上急淚宋世祖謂劉徳願曰卿哭貴妃悲者當厚賞徳願應聲慟哭撫膺擗踊涕泗交流上甚悅故用豫州刺史以賞之上又令醫術人羊志哭貴妃志亦嗚咽極悲他日有問志者曰卿那得此副急淚志曰我爾日自哭亡妾耳通鑑五花館荆南舊有五花館待賔之上地也故漢上成納詩曰不是上台憐姓字五花賔館敢從容南部新書烏龍㑹稽人張然滯役經年不歸婦與奴私通然養一狗名曰烏龍後然歸奴懼事覺欲謀殺然狗注睛視奴奴方興手烏龍盪奴奴失刀仗然取刀殺奴續捜神記鬚髯如㦸山隂公主淫恣悅褚彥回以白帝帝召彥回西上閣宿十日公主夜就之備見逼迫彥回整身而立從夕至曉畧不移志公主謂曰君鬚髯如㦸何無丈夫意彥回曰囘雖不敏何敢首為亂階通鑑田舎翁十斛麥李勣入見上問之曰朕欲立武昭儀為后褚遂良固執以為不可遂良既顧命大臣事當且己乎對曰此陛下家事何必更問外人上意遂决許敬宗宣言於朝曰田舎翁多收十斛麥尚欲易婦况天子立后何豫諸人事而妄生議乎同上赤鳳凰后所通宫奴燕赤鳳者雄捷能超樓閣兼通昭儀十月五日宫中故事上靈女廟吹塤擊鼓連臂踏歌赤鳳凰來曲后曰赤鳳凰為誰來昭儀曰赤鳳為姊來寜為他人乎后怒以杯擲昭儀裙曰鼠子能噬人乎昭儀曰穿其裙見其私足矣安在噬人乎帝微聞其事以問昭儀昭儀曰以漢家火德故以帝為赤鳳帝信之大悦趙后外傳雲仙雜記卷九
