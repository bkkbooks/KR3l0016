body:
  text: 雲仙雜記卷五唐馮贄撰筆描窻竹影宗測樂閑靜好松竹嘗見日篩竹影上窻以筆備描之常新録糖蜜莫逆交陳昉得蜀糖輒以蜜澆之曰與蜜本莫逆交傳芳略記風月常新印宫人臂明皇開元初宫人被進御者日印選以綢繆記印于臂上文曰風月常新印畢漬以桂紅膏則水洗色不退史諱録念金輪呪敲兩耳璫服桂心丸念金輪呪則所思之人不以存没是夜必夢見之事畧水晶環渡舟蕭整嘗登陸渾沙洲忽水漲不得下急呼村童折麈尾水晶環與之渡舟而過三賢典誥鳴牙餅許康年謁劉遜贈遜鳴牙餅千枚曰雖微物也助㕑中兩日之費退耕傳棠棣之好李初直遇與人相知則曰棠棣之好何以過此喜慶倍常叙聞録金蘭簿戴𢎞正每得密友一人則書于編簡焚香告祖考號為金蘭簿宣武盛事鴨卵成花向聲能於鐺中以手撥鴨卵成花河中記燭圍韋陟家宴使每婢執一燭四面行立人呼為燭圍長安後記宴客典斟陳無咎宴客一客用一婢典斟必十二斟而後使滿以盡誠敬之道洛都要記金牌盈座河間王夜飲妓女謳歌一曲下一金牌席終金牌盈座豐盈傳聚香團揚州太守仲端畏妻不敢延客謝廷皓謁之坐久饑甚端入内袖聚香團啗之揚州事迹待闕鴛鴦社朱子春未㛰先開房室帷帳甚麗以待其事旁人謂之待闕鴛鴦社粧樓記笑春紅閬州參軍黄涉婢曰笑春紅死渉念之淚洒犀簾至皆損壞蜀普録二花阮文姬揷􅁂用杏花陶溥公呼曰二花河東備録三鹿郡公𡊮利見為性頑獷方棠謂𡊮生已封三鹿郡公葢譏其太麤疎也幽燕記崑崙玉盞宇文卓方執崑崙玉盞聽左丞檀超髙談不覺墜地青州雜記坐間牡丹花宋旻語常帶華藻李孺安曰時方三月坐間生無數牡丹花矣鄴郡名録杜鵑喚歸石誼未娶聞杜鵑喚歸歎曰此物催人使歸使我何所歸􅁘金臺録遇河神顧希微開成二年遇河神屈莫多曰更二千年大江所在堤岸當崩沙九里禹功記口吻生花張祜苦吟妻孥喚之不譍以責祜祜曰吾方口吻生花豈恤汝輩白氏金鎖贈詩勝爛黄魚皇甫彚謁韓愈愈贈以詩彚退有言怒愈不為置酒愈曰豈不勝以爛黄魚待汝耶續鍾嶸句眼折筯不休山濤酒後哺啜折筯不休酒中𤣥防風粥白居易在翰林賜防風粥一甌剔取防風得五合餘食之口香七日金鑾密記食蝤蛑鹿宜孫食蝤蛑炙於夀陽㼝中頓進數器止戈集羣公對雪羣公對雪尚隆之曰麫堆金井誰調湯餅吳永素曰玉滿天山難刻珮環坐間服其韻精姑臧記屋瓦皆鏤余宗伯屋瓦皆鏤竅穴千百雨則散如真珠用陳留瓦則堅而易鏤三堂往事三年不見羊角皮蕃去北而復來鄱陽食竹笋曰三年不見羊角哀矣叩頭錄採星盆嵇昌蓄採星盆夏月漬果則倍冷叙聞錄作剪刀姑園鐵作剪刀以苜蓿根粉養之裁衣則盡成墨界不用人手而自行搔首集左撚巾拭面陽華用左撚巾拭面倍有光彩自慶傳碑石李輔國𦵏父碑石用豆屑一千團磨瑩如紫玉碑字四面鐫葵花三百朶晉公遺語漬紙以竹梢甘露和天南星漬紙一宿裁之刀去如飛文房寳飾除夜歎老裴度除夜歎老迨曉不寐爐中商陸火凡數添也金門歳節印普賢象𤣥奘以回鋒紙印普賢𧰼施於四衆每歳五䭾無餘僧園逸錄三辰酒𤣥宗置麴清潭砌以銀甎泥以石粉貯三辰酒一萬車以賜當制學士等史諱錄桑木根可作沉香想裴休得桑木根曰若作沉香想之更無異相雖對沉水香反作桑根想終不聞香氣諸相從心起也常新録皁盖能與日輪爭功韓愈刺潮州嘗暑中出張皁葢歸而喜曰此物能與日輪爭功豈細事耶傳芳畧記雷門四老石王維輞川林下坐用雷門四老石燈滅則石中鑚火事畧握麥芒刁字牛僧孺進士時常握麥芒刁字有繆誤隨手刪割㸃定三賢典畧麒麟草元和時館閣湯飲待學士者煎麒麟草鳯翔退耕傳魚藻洞魚朝恩有洞房四壁夾安瑠璃板中貯江水及萍藻諸色蝦號魚藻洞南康記鼻出黄膠賀知章忽鼻出黄膠數盆醫者謂飲酒之過從容録數米而食沈休文羸劣多病日數米而食羮不過一筯青陽記廬墓日影為之不移鄧寅廬墓墳土未乾日影為之不移壠上記飼牛以天麻飯青齊間遇春耕則飼牛以天麻飯仍用錦縷繫于角上耕桑偶記髙麗絲結張均妓多麗彈琵琶曲頂上有髙麗絲結趙詩爭奪致傷二指辨音集元夜食牛肺犯天樞使梁鄴上元後忽髮變如血卜曰元夜食牛肺犯天樞巡使夜行禱謝可免影燈記菖蒲成獅子鸞鳳状僧普寂大好菖蒲房中以菖蒲種成獅子鸞鳳仙人之狀海墨微言鴨肝猪肚王縉飲酒非鴨肝猪肚筯輒不舉醉仙圖記吞花卧酒虞松方春以謂握月擔風且留後日吞花卧酒不可過時曲江春宴錄庭椿不染風盧携夢人贈句曰若問登庸日庭椿不染風初不解其言後數年携拜相庭下古椿一株雖狂風驟雨不濕不揺鳳池編屋竅如七星鄭廣文屋室破漏自下望之竅如七星逢原記日用斗麫為糊以供緘封順宗時劉禹錫干預大權門吏接書尺日數千禹錫一一報謝緑珠盆中日用麫一斗為糊以供緘封宣武盛事麫如棗核而中空楊埏游王鉷家食一物如􅀥核而中空其實麫也埏詢其法鉷笑而不言河中記雲仙雜記卷五
