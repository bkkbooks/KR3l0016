body:
  text: 雲仙雜記卷八唐馮贄撰八角玉升宣帝時西夷怛陁國貢八角玉升夏以水澆之則無暑冬以火迫之無寒異事甚衆逢夏記失去周字知唐必興則天初稱周方具告天冊文有吏人見大周字上有兩仙童長二三寸執刀剗削斯須視之失去周字人知唐必復興鳳池編曲江春游曲江春游之家以脂粉作紅餤竿上成雙挑掛夾雜畫帶前引車馬曲江春遊録毛詩卷染油代燭倪芳飲後必有狂怪恬然不恥或以毛詩卷染油代燭醉遊徹曉醉仙圖記眉睫間常化佛清涼僧海豐苦行二十餘年人見其眉睫間常化佛千百大如黍米徃來遊行已不覺也清涼僧海好李花致富終南及廬岳出好李花兩市貴侯富民以千金買種終廬有致富者耕桑偶記一物如人眼睛蕭餘上元夜於宣陽里酒盤下得一物如人眼睛其體𩔖美石光彩射人餘夜遊市肆閑置掌中每行黑闇衢巷隨身光明三尺毫末可鑒後因而飛出影燈記造笙初造笙每管中入荻根細沙一豆許遇吹時飛沙於中激揚聲愈清徹近世樂工未有知者惜夫辨音集喬敷嗜魚喬敷嗜魚而貧日向漁人貸食漁人送魚一斤則以白堊標門記之後日償價年律一終白堊盈門壠上書浮陽筍九華小民浚池得物状𩔖竹根旁有一銘曰浮陽筍太古孕舉投醬缶三年不盡民不識字使人讀之試以豆一斗造醬投物其中果三年不減時逢道士青陽記爪甲間皆出雲煙魏郡開成中大旱徧禱山岳或言西沈陸先生道行精明請之必驗太守以下乃携杏酒青羊以備牲醪告于山中先生受禮訖對太守呼吸數過五指連拂之爪甲間皆出雲烟之氣惟中指氣象甚盛先生曰郡中雨得足諸縣皆獲八分亦可小稔已而其說不誣從容録石魚南康有狂人周可大見魚必置數十頭食餘棄于几上人謂隨即臭腐可大以手摩之皆為石魚後年餘友人訪之見其紙褁石魚煨以啖客新香不異常魚逍遥公南康記王母惜黄中李過蟠桃西王母居龍月城城中產黄中李花開則三影結實則九影花實上皆有黄中二字王母惜之過於蟠桃與紫陽真官博戲則以一二百枚遞分勝負集真記重黎盞酌水宣武判官洪子昇延嵩山鍊師在宅值大雨堦庭彌滿欲上堂户子昇有憂色鍊師取懷中重黎盞酌水不滿盃而庭砌隨已乾矣宣武盛事時元亨錬真方山道人時元亨錬真厭世三十餘年精唾涕淚俱惜之七十髮不白走如奔馬宋先生曰吾以小術令此子三日即死乃於酒中以羊豕腦一拌啖之元亨不覺也飲罷便苦頭痛下痢明日便出如剥浄雞頭肉者二三升許又明日元亨果卒河中記孫逢年好酒色老不衰長安孫逢年日一醉無虛席妓妾曳綺羅者二百餘人晚年衰憊齒皆蚛齲空虚如樓閣而舊好不衰長安後記王維居輞川地不容塵王維居輞川宅宇既廣山林亦逺而性好浄潔地不容浮塵日有十數掃飾者使兩童專掌縛帚而有時不給洛都要記磁石益眼益眼者無如磁石以為盆枕可老而不昬寜王宫中多用之豐寜傳魚喜鹿胎香揚州太守閭丘惠㑹僚友于轉沙亭集境内漁户令曰所得魚多者有金帛之賞有一漁人以肉物作塊散懸於網上取魚倍衆力凡十網得魚三千六百無甚小者衆慙而退太守詢之曰魚喜鹿胎之香適散懸者乃此物也下網召之萬魚畢聚矣揚州事迹降魔寺僧以名召魚東川降魔寺僧吉祥魁梧多力受飯五鉢日夜誦經九函池中魚知其數以名召之皆出水面使去即没蜀普錄并代人喜嗜麫并代人喜嗜麫切以吳刀淘以洛酒漆斗貯之擊鼓集老幼自以多寡取之至飽河東備錄鶴識字衞濟川養六鶴日以粥飲啖之三年識字濟川檢書皆使鶴銜取之無差金城記洗心糖茅地經冬燒去枝梗至春取土中餘根白如玉者搗汁煎之至甘可為洗心糖幽燕異記桃花絲青齊間有一種桃花盛開時垂絲至二三尺採之練以松脂遞相􅅶結織成鞋履寄往都下人皆不辨何物青州雜記秘密泉甘塘社有一水方丈瑩潔春夏不竭旱則禱之應時雨下然牛馬猪羊飲之肥澤雞鴨鵝鴈飲之必死鄉民縁可以救旱號秘密泉鄴郡名録怯夜幡胡陽白壇寺幡刹日中有影月中無影不知何故因號怯夜幡金臺記魚鼈隨世安危大禹治水功成令江淮河海神曰魚鼈衰盛隨世安危自此之後年必小減使其價遞増以食晚末之民應天意也禹功記書冊以竹漆為糊凡書冊以竹漆為糊逐葉微攤之不惟可以久存字畫兼紙不生毛百年如新此宮中法也白氏金鎖真脫絲布人之為文語意疎慢者真脫絲布文士之病莫大乎此鍾嶸句眼入酒中沐浴使毛髮識味石裕方明造酒數斛忽解衣入其中恣沐浴而出告子弟曰吾平生飲酒恨毛髮未識其味今日聊以設之庶無厚薄酒中𤣥龍口渠翰林有龍口渠通内苑大雨之後必飄諸花蕋經由而出有百種香色名不可盡春月尤妙金鑾密記口中現五色牙齒孔戣好術藝延接方士多所傳授能口中現五色牙齒彩色光絢一瞬即改止戈集李有九標蕭瑀陳叔逹於龍昌寺㸔李花相與闕香雅細淡潔密宜月夜宜緑髩宜白酒闕承平舊纂斗盆燒乳頭香曹務光見趙州以斗盆燒乳頭香十斤曰財易得佛難求舊相禪學錄鼠精李王侍中家堂前有鼠從地出其穴即生李樹花實俱好此鼠精李也好事集猪肝中有䜟書白浦民割猪肝肝中有一紙大如手色如新書云烟水蒼蒼明年無糧次年巢冦起州郡多荒纂異記酒魔元公輔不飲羣僚百種强之辭以鼻聞酒氣已醉其中一人謂可用術治之即取針挑元載鼻尖出一青蟲如小蛇曰此酒魔也聞酒即畏之去此何患元載是日已飲一斗五日倍是𤣥山記糠市洛陽振徳坊皆貧民例享糟糠之薄賀知章目為糠市從容錄品物互徵古事房璘至人家凡閱四筵摘其品物互徵古事一一切當河中記雲仙雜記卷八
