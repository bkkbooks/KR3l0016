front:
  text: 雲仙雜記卷一
  hash: sha256:fbdd3c9196a366dd7b6832371943054814e77a75cb77a9bb88e3c4226666be69
body:
  text: 唐馮贄撰幽人筆司空圖𨼆於中條山芟松枝為筆管人問之曰幽人筆正當如是汗漫録飛雲履白樂天燒丹於廬山草堂作飛雲履𤣥綾為質四面以素絹作雲朶染以四選香振履則如烟霧樂天著示山中道友曰吾足下生雲計不乆上升朱府矣樵人直説孫登琴孫登琴遇雨必有響如刄物聲竟因隂雨破作數截有黑蛟踊去金徽變化篇棋聲與律呂相應元頥本棋枰聲與律呂相應蓋用響玉為盤非有異術也棊天洞覽紅白二墨楚王靈䕫使人造紅白二墨為戯及書寫衣服黑衣用白書白衣用紅書自成一家大唐龍髓記龍耳李崔奉國家一種李肉厚而無核識者曰天罰乖龍必割其耳耳血墮地故生此李琴莊美事硫黄椀元載飲食冷物用硫黄椀熱物用泛水甆器器有三千事樞要録夢裁錦蕭頴士少夢有人授紙百畨開之皆是繡花又夢裁錦因此文思大進文筆襟喉無塵子方鎔𨼆天門山以㯶櫚葉拂書號曰無塵子月以酒脯祭之髙士春秋惜春御史穆宗每宫中花開則以重頂帳蒙蔽欄檻置惜春御史掌之號曰括香玉塵集黑松使者𤣥宗御案墨曰龍香劑一日見墨上有小道士如蠅而行上叱之即呼萬歳曰臣即墨之精黒松使者也凡世人有文者其墨上皆有龍賔十二上神之乃以墨分賜掌文官陶家缾餘事栁神九烈君李固言未第前行古栁下聞有彈指聲固言問之應曰吾柳神九烈君已用柳汁染子衣矣科第無疑果得藍袍當以棗餻祠我固言許之未幾狀元及第三峯集六鼻鏡生雲烟黄巢陷京城南唐王氏有鏡六鼻常生雲烟照之則左右前三方事皆見王氏向京城照之巢冦兵甲如在目前上平都邑以映日紗囊取入禁中纂異記文星典吏杜子美十餘歳夢人令采文于康水覺而問人此水在二十里外乃往求之見鵝冠童子告曰汝本文星典吏天使汝下謫為唐世文章海九雲誥已降可於豆壠下取甫依其言果得一石金字曰詩王本在陳芳國九夜捫之麟熟聲振扶桑享天福後因佩入葱市歸而飛火滿室有聲曰邂逅穢吾令汝文而不貴文覧𤣥山印記陳茂為尚書郎每書信印記曰𤣥山典記又曰𤣥山印擣朱礬澆麝酒閑則匣以鎮犀養以透雲香印書達數十里香不斷印刻胭脂木為之𤣥山記水玉數珠房次律弟子金圖十二歳時次律徴問葛洪仙籙中事以水玉一云𤣥珠數珠手節之凡兩徧近二百事琅琅誦之不止次律賞以轉枝梨童子通神集為梨花洗粧洛陽梨花時人多携酒其下曰為梨花洗粧或至買樹唐餘録籠桶衫柿油巾杜甫在蜀日以七金買黄兒米半籃細子魚一串籠桶衫柿油巾皆蜀人奉養之粗者浣花旅地志石斧銘𤣥針子得石斧銘曰天雷斧速文步敲石柱子如其言詩如蒸雲千歩千首清異志棠木印張寳凡衣服綵帛皆以所任官印印之白黄物以墨紅黒物以粉常曰此印賢於掌庫奴逺矣文字亦然人收寳文以有棠木印者為真張寳就印録鳳窠羣女姑臧太守張憲使倡妓戴拂壺中錦仙裳密粉淡粧使侍閣下奏書者號傳芳妓酌酒者號龍津女傳食者號仙盤使代書札者號墨娥按香者號麝姬掌詩藁者號雙清子諸倡曰鳳窠羣女又曰團雲隊曳雲仙亦佳話云姑臧前後記地仙圓虢州别駕竇淝以當歸為地仙圓曰使血海増光以􅀥木為杵臼號金剛骨三堂往事凉物房壽六月召客坐糠竹簟凭狐文几編香藤為爼刳椰子為盃擣蓮花製碧芳酒調羊酪造含風鮓皆凉物也壽勸吳田以轆轤瓮田懼其深曰但見龍門溪水濯麴糵腸耳叩頭録梅粧閣郭元振落梅粧閣有婢數十人客至則拖鴛鴦襭裙衫一曲終則賞以糖雞卵明其聲也宴罷散九和握香叙聞録洛陽歳節洛陽人家正旦造絲雞蠟燕粉荔枝正月十五日造火蛾兒食玉梁餻寒食装萬花輿煮楊花粥端午术羮艾酒以花絲樓閣揷髩贈遺辟瘟扇乞巧使蜘蛛結萬字造明星酒装同心膾重九迎涼脯羊肝餅佩癭木符冬至煎餳綵珠戴一陽巾除夜銅刀刻門埋小兒硯㸃水盆燈臘日造脂花餤金門歳節栴檀寺春秋二㑹栴檀寺悟本書春秋二㑹斂牛乳為龍華飯供獻結綵錢為幡蓋設客以吳興臠團糟授戒者施以般若錢求男者解密珠璫僧園逸録搔首問青天李白登華山落鴈峯曰此山最髙呼吸之氣想通天帝座矣恨不携謝朓驚人詩来搔首問青天耳搔首集清髙門户樂天語人曰吾已脫去利名枷鎖開清髙門户但蓮龕子母丹不知何時可成自慶傳午橋莊裴令臨終告門人曰吾死無所繫但午橋莊松雲嶺未成軟碧池繡尾魚未長漢書未終篇為可恨爾晉公遺語養硯墨筆紙養筆以硫黄酒舒其毫養紙以芙蓉粉借其色養硯以文綾蓋貴乎隔塵養墨以豹皮囊貴乎逺溼逢溪子遵之文房寳飾迷香洞史鳳宣城妓也待客以等差甚異者有迷香洞神雞枕鎖蓮燈次則交紅被傳香枕八分羮下列不相見以閉門羮待之使人致語曰請公夢中來馮垂客于鳳罄囊有銅錢三十萬盡納得至迷香洞題九迷詩于照春屏而歸常新錄袖裏春𤣥宗為太子時愛妾號鸞兒多從中貴董逍遥微行以輕羅造梨花散蘂裛以月麟香號袖裏春所至暗遺之史諱録金鳳凰周光禄諸妓掠髩用欝金油傅面用龍消粉染衣以沈香水月終人賞金鳳凰一􅃗傳芳畧記三賢松朝真觀九星院有三賢松三株如古君子梁閣老妓英奴以麗水囊貯香遊之不數日松皆半枯事畧芋魁遭遇李華燒三城絶品炭以龍腦褁芋魁煨之擊爐曰芋魁遭遇矣三賢典語山神以豐年相報琴叟耕鳳嶺之田以虎紋巾褁犂推之曰勞吾躬耕山神必以豐年相報已而果然鳳翔退耕傳綰龍臺李神遇以楓溪鐵造綰龍臺為宴燈花燈八層間以三縫錦褾㸃紫菱油燃鳳縷疑尚缺文出捃摭精華吳興米吳興米炊之甑香白馬豆食之齒醉虢國夫人㕑吏鄧連以此米擣為透花糍以豆洗皮作靈沙臛以供翠鴛堂品物類聚記掃露明軒王施避巢冦入天台山主人賀理給以牛粥練帬施謝曰公乃命司延我光景當為掃露明軒永為明公下吏芳賢𫝊吞雲夢澤張曲江語人曰學者常想胷次吞雲夢澤筆頭湧若􅁘溪量既并包文亦浩瀚徴文玉井雲仙雜記卷一
