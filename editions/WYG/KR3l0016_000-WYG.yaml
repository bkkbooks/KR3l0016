body:
  text: 雲仙雜記小説家𩔖一雜事之屬提要臣等謹案雲仙雜記十卷舊本題唐金城馮贄撰贄履貫無可考其書雜載古人逸事如所稱戴逵雙柑斗酒往聽黃鸝之𩔖詩家往往習用之然實偽書也無論所引書目皆厯代史志所未載即其自序稱天復元年所作而序中乃云天祐元年退歸故里書成于四年之秋又數歲始得終篇年號先後亦復顛倒其為依托明矣考陳振孫書錄解題有馮贄雲仙散錄一卷亦有天復元年序振孫稱其記事造語如出一手疑贄為子虚烏有之人洪邁容齋隨筆趙與旹賔退錄所説亦皆相𩔖然不能指為何人作張邦基墨莊漫錄云近時傳一書曰龍城錄乃王性之偽為之又作雲仙散錄尤為怪誕又有李歜注杜甫詩注東坡詩皆出性之一手殊可駭笑然則為王銍所作無疑矣惟陳振孫稱雲仙散錄一卷此乃作雲仙雜記十卷頗為不同然孔傳續六帖所引散錄騐之皆在此書中其即為一書顯然可證疑卷數則陳氏誤記書名則後人追改也此本為葉盛菉竹堂所刋較説郛諸書所載多原序一篇其書未經刪削較他本亦為完備云乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀雲仙雜記原序纂𩔖之書多矣其間所載世人用於文字者亦不下數十輩則今未免為陳言也予事科舉三十年蔑然無效天祐元年退歸故里築選書室以居取九世所蓄典籍經史子集二十萬八千一百二十卷六千九百餘帙撮其膏髓别為一書其門目未暇𣲖别也成於四年之秋由急於應文房之用乃不能詳又數歳復得終篇者四部英華筆頭飛文壇戈㦸應題録皆傳記集異之説若見於尋常之書者此必畧之庶兵火煨燼之後或者不至束手豈小補歟同志者幸為珍秘之天復元年十二月馮贄序欽定四庫全書
