  text: 雲仙雜記卷之三
  hash: sha256:b9dcea57997b7d72d9a79480f105c643df6cbb7f490e57dc9ef48a6a55a93459
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0016_SBCK_003-1a}
body:
  text: 過門錢龍山康甫慷慨不羈每日置酒於門邀留賔客不住者贈過門錢日費酒者鶴觜瓶二十放懷集虞永興書有人收得虞永興與圓機書一紙剪開字字賣之礬鄉一字得麻一斗鶴口一字得銅硯一枚房村一字得芋千頭隨人好之淺深字錦一醉六日張麟一醉六日嚙柱幾半醉録起宅刷以醇酒蓮花巷王珊起宅畢其門刷以醇酒更散香末蓋禮神之至宣武盛事題梁字范溥題聽事梁每字以木花蓮承之歲旦一開次日復上之河中記郇公厨韋陟厨中飲食之香錯雜人入其中多飽飫而歸語曰人欲不飯筋骨舒寅緣須入郇公厨長安後記厠上以术湯盥手陳宛盛其居止厠上以术湯盥手槐板覆蔽糞穴為都城苐一洛陽要記書此山移文樂天女金鑾十歲忽書北山移文示家人樂天方買終南紫石欲開文士傳遂輟以勒之豐寧傳爭春館楊州太守圃中有杏花數十畷每至爛開張大宴一株令一倡倚其傍立館曰爭春開元中宴罷夜闌人或云花有歎聲楊州事邇薛家士風成都薛氏家士風甚美厨司以半瓠為杓子孫就食蝦羮肉臠一取之飯再取之蜀普録食蒲桃楊炎食蒲桃曰汝若不澀當以太原尹相授河東備録梅聘海棠棖子臣櫻桃黎舉常云欲令梅聘海棠棖子臣櫻桃及以芥嫁笋但恨時不同耳然牡丹酴醿楊梅枇杷幸為執友金城記檜生藥圓幽燕思仙驛後有五樹檜忽生藥圓試摘服之往往療疾有驗幽燕記異過廳羊熊翻每會客至酒半階前旋殺羊令衆客自割隨所好者綵綿繫之記號畢蒸之各自認取以剛竹刀切食一時盛行號過廳羊青州雜記軟漆纏桑枝為籬障杜勝宅以軟漆纏桑枝編為籬障雨一過黑光照四面時通甫愛之欲以銅官苐取不應鄴郡名録嚼雞舌香飲酒者嚼雞舌香則量廣浸半天回則不醉酒中玄能詩能詩之士雨泡滅則淂意香煙斷而成冷白氏金鎖朱書禹字渡江河渡江河者朱書禹字佩之免風濤保安吉禹功記盡數天星遍知棊勢人能盡數天星則遍知棊勢止戈集雌雄樹九仙殿銀井有梨二株枝葉交結宫中呼為雌雄樹金鑾密記作詩如繡花作詩如繡花女令龍絡枝葉而已無過不及乃善鍾嶸句眼化玉膏衛玠盥靣用化玉膏及芹泥故色愈明潤終不枯稿金臺録貯蘭蕙玉維以黃磁斗貯蘭蕙養以綺石纍年彌盛汗漫録百齒梳孫思邈以交加木造百齒梳用之養生要法也樵人直説科斗筯魚尾匙向範待客有漆花盤科斗筯魚尾匙樞要録唾地成文有人謁李賀見其久而不言唾地者三俄而成文三萹文茟襟喉菖蒲當拜此君王徽之以菖蒲映竹曰菖蒲止以九莭為貴而此君面目聳然正當再拜此君而此君亦安得不受之耶高士春秋界尺茟槽有借界尺筆槽而破其槽者白其主人曰韓直木如常孤竹君無恙但半靣之交忽然折莭矣主人大笑玉塵集犀如意虞世南以犀如意􅐡癢久之歎曰妨吾聲律半工夫瓶餘事萱草浣衣鄭源令婢萱草浣衣萱草輒云郎君塵土太多令人手皮俱脫三峰集乕毛紅管茟有僦馬生甚貧遇人與乕毛紅管筆一枚曰所須但呵茟即得之然夫妻之外令一人知則殆矣時方盛行凝煙帳風篁扇皆呵而淂之一日晚思兔頭羔連呵遽得數盤夫妻不能盡以與鄰家自是茟雖存呵之無應纂異記一詩輒洗其茟白傳每一詩輒洗其筆文覽句中喜得魚竹孟浩然一日周旋竹間喜色可掬又見網師得魚尤甚喜躍友人問之答云吾適得句中有魚竹二物不知竹有幾莭魚有幾鱗疑致踈謬今見二物乃釋然矣玄山記洪兒紙薑澄十歲時父苦無紙澄乃燒粳協竹為之以供父澄小字洪兒鄉人號洪兒紙童子通神録束修羊倪若水藏書甚多列架不足疊窗安置不見天日子弟直日看書借書者先投束修羊唐餘録惠一絲兩絲杜甫寓蜀每𧖟熟即與兒躬行而乞曰如或相憫惠我一絲兩絲浣花旅地志蕨成金叉王鯨逢賣蕨姥黃衣破結有飢色憫之乃以千錢買蕨姥謝而去及歸蒸于烏頭甑盡成金叉蓋姥非常人也清異志雞鴨卵殼張寶嘗使子弟巡市乞雞鴨卵殼雞卵以煮藥鴨卵以金絲縷海棠花名鮫胎盞醉後畏酒時多用之就印録八梭綾鄴中老母村人織綾必三交五結號八梭綾匹直米陸筐托拾精華染花奩郭代公愛姬薛氏貯食物以散風奩收粧具以染花奩品物類聚記文享媚香無忝張説携麗正文章謁友生時正行宫中媚香號化樓臺友生焚以待説説出文置香上曰吾文享是香無忝徴文玉井少延清歡陶淵明得太守送酒多以舂秫水雜投之曰少延清歡數日淵明别傳筆文章貨羅隱喜茟工萇鳳語之曰茟文章貨也吾以一物助子取髙價即贈鴈頭箋百幅士夫聞之懷金同價或以綵羅大組換之龍鬚志降龍道者戴顒見降龍道者曰生死外人願陳三拜獻護經簾青銅磬芳賢傳何徵君隱吳郡何徵君隱吳郡多遊臨華寺九金堂飲鹿塘靈寶院涵星澗高隱外書西昌逸士郎詠隱西昌採樵為業或擔至都中人買之則曰我西昌逸士酒中人也今獻公所闕公當惠我所好廬陵記享鹿肉黃升日享鹿肉三斤自晨煮至日影下門西則喜曰火候足矣如是四十年安成記獵蠅記室盧記室多作脯臘夏則委人於十步內扇上塗餳以擈蠅脯以青紗障隔塵土時人呼為獵蠅記室金溪記種𬞞助鼎爼宋宇種蔬三十品時雨之後按行園圃曰天茁此徒助豫鼎爼家復何患豫章記蓄鴨富揚庭蓄鴨萬隻每飼以米五石遺毛覆渚桂林記雲仙雜記卷之三
