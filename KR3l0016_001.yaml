front:
  text: 雲仙雜記卷之一
  hash: sha256:b79ece0a177dd549106bd5c4a413bfbc1c3ff33dceded81294f88631fdf50dd8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0016_SBCK_001-1a}
body:
  text: 唐金城馮贄編幽人茟司空圖隱於中條山芟松枝為茟管人問之曰幽人茟正當如是汗澷録飛雲履白樂天燒丹于廬山草堂作飛雲履玄綾為質四面以素綃作雲朶染以四選香振履則如烟霧樂天着示山中道友曰吾足下生雲計不乆上升朱府矣樵人直説孫登琴孫登琴遇雨必有響如刃物聲竟因隂雨破作數截有黑蛟踊去金徽變化萹棊聲與律呂相應元頥本棋枰聲与律呂相應盖用響玉為盤非有異術也棊天洞覽紅白二墨楚王靈䕫使人造紅白二墨為戲及書寫衣服黑衣用白書白衣用紅書自成一家髓記大唐龍龍耳李崔奉國家一種李肉厚而無核識者曰天罰乖龍必割其耳耳血􅑁地故生此李琴莊美事瑠黄椀元載飲食冷物用磂黄椀熱物用泛水甆器器有三千事岀樞要録夢裁錦蕭頴士少夣有人授𥿄百畨開之皆是繡花又夢裁錦因此文思大進岀文茟襟喉無塵子方鎔隱天門山以㯶櫚葉拂書號曰無塵子月以酒脯祭之岀高士春秋惜春御史穆宗每宫中花開則以重頂帳蒙蔽欄檻置惜春御史掌之號曰括香玉麈集黑松使者元宗御案墨曰龍香劑一日見墨上有小道士如蠅而行上叱之即呼萬歳曰臣即墨之精黒松使者也凡世人有文者其墨上皆有龍賔十二上神之乃以墨分賜掌文官岀陶家缾餘事栁神九烈君李固言未第前行古栁下聞有弹指聲固言問之應曰吾柳神九烈君巳用桞汁染子衣矣科苐無疑果得藍𫀆當以棗餻祠我固言許之未㡬状元及第岀三峰集六鼻鏡生雲烟黄巢䧟京城南唐王氏有鏡六鼻常生雲烟照之則左右前三方事皆見王氏向京城照之巢冦兵甲如在目前上􅊭都邑以映日紗囊取入禁中岀纂異記文星典吏杜子美十餘歳夢人令采文于康水覺而問人此水在二十里外乃徃求之見鵝冠童子告曰汝本文星典吏天使汝下謫為唐世文章海九雲誥已降可於豆壠下取甫依其言果得一石金字曰詩王本在陳芳國九夜捫之麟篆熟聲振扶桑享天福後因佩入葱市㱕而飛火滿室有聲曰邂逅穢吾令汝文而不貴岀文覽玄山印記陳荗為尚書郎每書信印記曰玄山典記又曰玄山印擣朱礬澆麝酒閑則匣以鎮犀飬以透雲香印書達數十里香不斷印刻烟脂木為之岀玄山記水玉數珠房次律弟子金圖十二歳時次律徴問葛洪仙籙中事以水玉一云玄珠數珠手節之凡兩徧近二百事琅琅誦之不止次律賞以轉枝梨童子通神集為梨花洗粧洛陽梨花時人多携酒其下曰為梨花洗粧或至買樹唐餘錄籠桶衫柿油巾杜甫在蜀日以七金買黄兒米半籃細子魚一串籠桶衫柿油巾皆蜀人奉飬之粗者岀浣花旅地志石斧銘玄針子得石斧銘曰天雷斧速文歩𫾣石柱子如其言詩如蒸雲千歩千首清異志棠木印張寳凡衣服綵帛皆以所任官印之白黄物以墨紅黒物以粉常曰此印賢於掌庫奴逺矣文字亦然人收寳文以有棠木印者為真張寳純印録鳳窠羣女姑臧太守張憲使倡妓戴拂壺中錦仙裳密粉淡粧使侍閣下奏書者號傳芳妓酌酒者號龍津女傳食者號仙盤使代書札者號墨娥按香者號麝姬掌詩藁者號雙清子諸倡曰鳳窠群女又曰團雲隊曵雲仙岀姑臧前後記地仙圓虢州别駕竇淝以當㱕為地仙圓曰使血海増光以棗木為杵臼號金剛骨岀三堂徃事凉物房壽六月召客坐糠竹簟凭狐文几編香藤為爼刳椰子為盃擣蓮花製碧芳酒調羊酪造含風鮓皆凉物也壽勸呉田以轆轤瓮田懼其深曰但見龍門溪水濯麴蘖腸耳岀叩頭錄梅粧閣郭元振落梅粧閣有婢數十人客至則拖鴛鴦襭裙衫一曲終則賞以糖雞邜明其聲也宴罷散九和握香岀叙聞錄洛陽歳莭洛陽人家正旦造絲雞葛燕粉荔枝正月十五日造火蛾兒食玉梁餻寒食装萬花輿煮楊花粥端午术羮艾酒以花絲樓閣揷髩贈遺辟瘟扇乞巧使蜘蛛結萬字造眀星酒装同心膾重九迎凉脯羊肝餅佩癭木符冬至煎餳綵珠戴一陽巾除夜銅刀刻門埋小兒硯㸃水盆燈臘日造脂花餤金門嵗莭旃檀寺春秋二㑹栴檀寺悟本詩春秋二㑹歛牛乳為龍華飯供獻結綵錢為幡蓋設客以呉興臠團糟授戒者施以般若錢求男者觧密珠璫岀僧園逸録搔首問青天李白登華山落鴈峰曰此山最髙呼吸之氣想通天帝座矣恨不携謝朓驚人詩来搔首問青天耳搔首集清髙門户樂天語人曰吾已脫去利名枷鎖開清髙門户但蓮龕子母丹不知何時可成自慶傳午橋莊裴令臨終告門人曰吾死無所繫但午橋莊松雲嶺未成軟碧池繡尾魚未長漢書未終萹為可恨爾晋公遺語養硯墨茟𥿄養茟以磂黄酒舒其毫養𥿄以芙蓉粉借其色養硯以文綾盖貴乎隔塵飬墨以豹皮囊貴乎逺濕逢溪子遵之文房寳􅎖迷香洞史鳳宣城妓也待客以等差甚異者有迷香洞神鷄枕鎖蓮燈次則交紅被傳香枕八分羊下列不相見以閉門羮待之使人致語曰請公夢中来馮垂客于鳳罄囊有銅錢三十萬盡納得至迷香洞題九迷詩于照春屏而㱕常新録袖裏春元宗為太子時愛妾號鸞兒多従中貴董逍遥微行以輕羅造梨花散蘂裛以月麟香號䄂裏春所至暗遺之史諱録金鳯凰周光祿諸妓掠髩用欝金油傅靣用龍消粉染衣以沈香水月終人賞金鳳凰一隻傳芳略記三賢松朝真觀九星院有三賢松三株如古君子梁閣老妓英奴以麗水囊貯香遊之不數日松皆半枯事略芋魁遭遇李華燒三城絶品炭以龍腦褁芋魁煨之擊爐曰芋魁遭遇矣三賢典語山神以豐年相報琴叟耕鳳嶺之田以虎紋巾褁犂推之曰勞吾躬耕山神必以豐年相報已而果然鳯翔退耕傳綰龍臺李神遇以楓溪鐵造綰龍臺為宴燈花燈八層間以三縫錦褾㸃紫菱油燃鳳縷疑尚缺文岀桾摭精華吳興米吳興米炊之甑香白馬豆食之齒醉虢國夫人㕑吏鄧連以此米擣為透花糍以豆洗皮作靈沙臛以供翠鴛堂品物類聚記掃露明軒王施避巢冦入天台山主人賀理給以牛粥練帬施謝曰公乃命司延我光景當為掃露明軒永為下吏芳賢傳吞雲夢澤張曲江語人曰學者常想胷次吞雲夢澤茟頭湧若耶溪量既并包文亦浩瀚徴文玉井雲仙雜記卷之一
