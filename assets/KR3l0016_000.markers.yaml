  - {type: variant, offset: 196, length: 294, content: 雲仙襍記目錄卷之一幽人茟飛雲履孫豋琴棋聲與律吕相應紅白二墨龍耳李磂黄椀夢裁錦無塵子惜春御史黑松使者桞神九烈君六鼻鏡生雲烟文星典吏玄山印記水玉數珠為梨花洗粧籠桶衫柿油巾石斧銘棠木印鳯窠群女地仙圓凉物梅粧閣洛陽歲莭􅏧檀寺春秋二㑹㮻首問青天清髙門戸午橋荘飬硯墨茟𥿄迷香洞袖裏春金凰凰三賢松芋魁遭遇山神以豐年相報綰龍臺呉興米掃露眀軒吞雲夢澤卷之二田水聲過吾師龍鬚友隱士衫俗耳鍼砭詩膓鼓吹半月履菱角巾大鯉五色烟姿玉骨日精火筯如両儀羔羊揮淚屋龍更衣掌有卧蛇文栗木為關九華半臂遷官靣長額有光氣壺中景辨琴秦楚聲臨光宴水松牌泛春渠百花獅子桃花𥿄酒器九品暖香滿室如春啼猿生蕨買春錢苦吟蛻龍牙碎金靣基盤琴價与武, WYG: 欽定四}
