  - {type: variant, offset: 5, length: 1, content: 編, WYG: 撰贄履貫無可考其書雜載古人逸事如所稱戴逵雙柑斗酒往聽黃鸝之𩔖詩家往往習用之然實偽書也無論所引書目皆厯代史志所未載即其自序稱天復元年所作而序中乃云天祐元年退歸故里書成于四年之秋又數歲始得終篇年號先後亦復顛倒其為依托明矣考陳振孫書錄解題有馮贄雲仙散錄一卷亦有天復元年序振孫稱其記事造語如出一手疑贄為子虚烏有之人洪邁容齋隨筆趙與旹賔退錄所説亦皆相𩔖然不能指為何人作張邦基墨莊漫錄云近時傳一書曰龍城錄乃王性之偽為之又作雲仙散錄尤為怪誕又有李歜注杜甫詩注東坡詩皆出性之一手殊可駭笑然則為王銍所作無疑矣惟陳振孫稱雲仙散錄一卷此乃作雲仙雜記十卷頗為不同然孔傳續六帖所引散錄騐之皆在此書中其即為一書顯然可證疑卷數則陳氏誤記書名則後人追改也此本為葉盛菉竹堂所刋較説郛諸書所載多原序一篇其書未經刪削較他本亦為完備云乾隆四十二年十月恭校上總}
