front:
  text: 雲仙雜記卷之四
  hash: sha256:3a04052519c0c6c0541e49e0275c5f44bebe002870d0b6f160f4ff638929f3dd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0016_SBCK_004-1a}
body:
  text: 石鼈銜賦題髙郢夜課于豐亭忽見一鼈在案上視之石也郢異其事取千題散置楮中禱祝令石鼈銜之以卜来事既而石鼈舉頭乃是沙洲獨鳥賦題出果然其年首選湘潭記自負書劒凌倚隱衡山徃来自負書劍削竹為擔褁以烏氈倚既死山僧取以供事衡山記松精成使者茅山有野人見一使者異服牽一白羊野人問居何地曰偃盖山隨至古松下而没松形果如偃盖意使者乃松樹精羊乃茯苓耳金陵記龍窠石中山僧表堅面多瘢痕偶溪中淂石如鷄子夜覺凉冷信手磨面瘢痕盡滅後讀博異志曰龍窠石磨瘡瘢大效廬山記召客念無魚蘓蠙郎中召客無魚念曲江多有而禁釣乃令掌吏用油幕偷數頭適濟其事承􅊭舊纂金雞抱卵時封少卿問禪於龍華厚㕘師曰金雞抱卵時如何少卿㱕而黙坐三年不能領觧至于發狂而死禪學録胡松莭支琴白傅用胡松莭支琴金徽變化萹竊嚥棊子李杓直與人棊而敗乃竊數子嚥之尋問乃鼓局大恕棊天洞覽墨染紙不昬墨染𥿄三年字不昬暗者為上成老相墨經茶燋縛奴投火陸鴻漸採越江茶使小奴子㸔焙奴失睡茶燋爍鴻漸怒以鐡繩縛奴投火中蠻甌志袖餅班中于琮班中有時袖餅而食或以遺同列常朝記石蓮匣許芝有玅墨八厨巢賊亂瘗于善和里苐事􅊭取之墨已不見惟石蓮匣存焉大唐龍髓記鵝烝藺先生上隱亭望九里山七日不能下但食鵝烝二十叚琴荘美事粉指印青編徐州張尚書妓女多涉獵人有借其書者徃徃粉指痕並印于青編籹樓記一里更二馬校書郎李蟠蓄馬甚多出遊則一里更二馬借徣供應可逮十家馬癖記旋風茟魏博田承嗣簽治文案如流水吏人私相謂曰世罕有此旋風茟方鎮編年贈相得以鳩毛傳好食鳩人與已相得者必以鳩贈之一見李翺贈十二籃好事集物價至微開成中物價至微村落買魚肉者俗人買以胡絹半尺士大夫買以樂天詩一首兼与之豐年編夜飛蟬杜甫每朋友至引見妻子韋侍御見而退使其婦送夜飛蟬以助籹􅎖放懷集羲之鬼虞世南書冠當時人謂其有羲之鬼字錦竹枝曲張旭醉後唱竹枝曲反復必至九回乃止醉録却老先生王僧䖍晚年惡白髮一日對客左右進銅鑷僧䖍曰却老先生至矣庶㡬乎南康記小兒司命郭汾陽語子弟曰西陽庶寳方小兒之司命不可不讀從容録青蠅拜賀術士相牛僧孺若青蠅拜賀方能及苐公疑之及登科訖㱕坐家庭有青蠅作八行立約數萬折躬再三良久乃去青陽記葬淂石牌烏重胤葬先世掘得石牌有云牛領岡前紅簫隴下葬用丙日手板相亞重胤依而用之壠上書貧而圖㛰白厚貧而圖㛰娶劉純材女厚送烏璫十事麩紙為書純材大笑荅以象田珠十升紫弱千餘頭及使家僮撒燭花盈路厚閉門大慙賔客走去耕桑偶記以海駮皮為皷凡鼓以海駮疑是鮫字皮為之泥以象骨則雄而清用雜皮則濁而易散云辨音集上元影燈洛陽人家上元以影燈多者為上其相勝之辭曰千影萬影又各家造芋郎君食之宜男女仍云送鷄肉酒用六木缾貯之於親知門前留地而去影燈記軟棗餻宣慈寺每求化人先留食軟棗餻栁尚書来方食餻袖䟽欲出尚書急觧連帶緋袍鏁子魚袋施之海墨微言竊花霍定與友生遊曲江以千金募人竊貴侯亭榭中蘭花揷㡌兼自持住綺羅􅓜中賣之士女争買抛擲金錢又各以錐刺藕孔中者罰巨觥不中者得美饌曲江春宴録酒窟蘓晉作曲室為飲所名酒窟又地上每一塼鋪一甌酒計甎約五萬枚晉日率友朋次苐飲之取盡而已醉仙圖記詩成裁窻紙叚九章詩成無紙就窻裁故紙連綴用之九章字惠文逄原記白羊籹㸃芳草午橋莊小兒坡茂艸盈里晉公每使數羣白羊散于坡上曰芳草多情頼此籹㸃也窮幽記浮萍為鴨作茵褥浮光多美鴨太原少尹樊千里買百隻置後池載數車浮萍入池使為鴨作茵褥雲林異景志自為小君裁剪李紳為相時俗尚輕綃染蘸碧為婦人衣紳自為小君裁剪鳯池編貴家棋子開成中貴家以紫檀心瑞龍腦為棊子棋談弄葫蘆成詩王筠好弄葫蘆每吟詠則注水於葫傾已復注若擲之於地則詩成矣詩源指訣好讀離騷錢芸士好讀離騷手不暇掲忘去肉味半月如齋姑臧記挼花浸酒楊恂遇花時就花下取蘂粘綴于婦人衣上微用蜜蠟兼挼花浸酒以快一時之意三堂徃事挑野𬞞郭元申家貧無食春月携兒挑野蔬一日有餘三日不出叩頭録簇酒辛洞好酒而無資常携榼登人門每家取一盞投之號為簇酒叙閑録祭詩以酒脯賈島常以歳除取一年所淂詩祭以酒脯曰勞吾精神以是補之金門嵗莭碬磨齋都下寺院每歳用除碬磨是日作碬磨齋僧園逸記歛衣伊處士従衆人求尺寸之帛聚而服之名曰歛衣搔首集凌虗宴齊文宣帝凌虗宴取香菌以供品味廣唐則出扵石首銅官䓁處銅釘菌分絲菌自慶傳桃花醋唐世風俗貴重葫蘆醬桃花醋照水油晉公遺語蟣肝龍首毛重教授於導江春日主人宴之賦散語曰蟣肝之奉何堪龍首之攀可望主人曰吾勸以陸源鯖賞以桞綿肝文房寳􅎖雲仙雜記卷之四
