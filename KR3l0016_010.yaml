  text: 雲仙雜記卷之十
  hash: sha256:d90367ba23715201855eb3331ae394c7dc14cf940cf05119eca81a1e902bdada
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0016_SBCK_010-1a}
body:
  text: 㽔賔鐵樂工廉郊師於曹綱綱曰教授人多矣未有此性靈弟子也郊常池上彈㽔賔調忽聞芰荷間有物跳躍出岸乃方響一片有知者識是㽔賔鐵也指撥精妙致律吕相應物類相感耳琵琶録截鐙留鞭姚崇牧荆州受代日闔境民泣撫馬首截鐙留鞭以表瞻戀開元天寶遺事蜂蝶慕香都下名妓楚蓮者國香無及每出則蜂蝶相隨慕其香同上自暖杯內庫有青酒杯紋如亂絲其薄如紙以酒注之溫溫然有氣相次如沸湯名自暖杯同上遊仙枕龜兹國進一枕色如瑪瑙枕之則十洲三島四海五湖盡入夢中帝名為遊仙枕同上辟寒犀交趾國進犀一株以金盤置於殿中暖氣襲人使者曰此辟寒犀也同上喚鐵太白山居士郭休有運氣絶粒之術以繩繫一鐵片子鳥獸聞之即集庭下名曰喚鐵寶遺事開元天氷山進士張彖力學有大名楊國忠用事爭詣門彖獨不往曰爾輩謂楊公之勢可倚如太山耶以吾所見乃氷山也皎日一照則當誤人後登苐為華隂尉歎曰丈夫有凌雲蓋世之志拘於下位若立身於矮屋中使人擡頭不得遂拂衣長往同上花裀學士許慎與親友宴花圃中聚花鋪座曰吾自有花禋何消坐具同上風流藪澤長安平康坊妓女所居新進士以紅箋名紙遊其中時謂此坊為風流藪澤同上茟頭生花李太白少夢茟頭生花後天才贍逸名聞天下百寶欄上賜國忠木芍藥國忠以百寶為欄開元遺事吸花露貴妃每宿酒𥘉消多苦肺熱凌晨傍花枝口吸花露潤肺同上含玉咽津貴妃素有肉體苦熱肺渴每曰含一玉魚藉其涼津沃肺同上夜明枕虢國夫人有夜明枕光照一室不假燈燭同上粲花李白與人談論皆成句讀如春葩麗藻粲於齒牙時號李白粲花之論同上二鶻擲卵嘉陵江上見二鶻擲卵相上下以接之蓋習其飛也其胎教之意乎又翅羽未成躍出巢穴往往􅑁崕而死其天性俊勇是亦躁進之類山雞自愛山雞自愛其色終日映水目眩則溺死天心月脅皇甫湜稱愈文曰穿天心出月脅茗戰建人謂鬪茶為茗戰金鹿銀麕天子北征曹奴之人觴天子于洋水之上賜金鹿銀麕今有地上得銀豚金狗之類皆古賂夷狄竒貨穆天子傳溫柔鄉成帝謂合德為溫柔鄉曰吾老是鄉矣不能效武帝求白雲鄉也樊嬺賀曰陛下真得仙者合德號為婕妤趙后外傳六甲行厨左慈明六甲能役鬼神坐致行厨葛洪傳老子㒒徐甲老子西度關關令尹喜知其非常人從之問道老子大驚舌𥅆然故號老𥅆老子耳有三漏手握十文其僕徐甲約日直百錢自隨二百年計欠七百二十萬錢甲詣關令索所欠令問老子對曰甲久應死吾以太玄清生符救之得至今日使甲張口向地符出丹書文字如新甲立成一聚枯骨令知老子神異叩頭請命復以符投骨上甲乃復生龍牀韓志和有道術憲宗時獻一龍牀坐則鱗鬛瓜角皆動又於御前以蠅虎子數十令分隊舞梁州曲皆中音莭沈玢傳九色鳳雛東方朔遊房林之野獲九色鳳雛洞冥記懷夢草鍾火山有香草武帝思李夫人東方朔獻帝懷之即夢見名懷夢草洞冥記青鸐羽山之北有鳥曰青鸐聲如鐘磬世語曰青鸐鳴時太平拾遣記寶井范蠡收四方難得之貨或藏之井塹謂之寶井麗色溢於閨房謂之遊宫拾遺記瓊厨金穴光武皇后弟郭况家工冶之聲不絶人謂之郭氏之室不雨而雷東亰謂况家為瓊厨金穴流香渠靈帝起裸遊館千間渠水繞砌蓮大如蓋長一丈其葉夜舒晝卷名夜舒荷宫人靚粧解上衣著內服或共裸浴西域貢茵墀香煮湯餘汁入渠號流香渠書倉曹曽積石為倉以藏書名曹氏書倉如願有商人過清湖見清湖君君問所需商曰但乞如願君許之果得一婢如願即其名也商有所求悉能致之後因正旦如願晚起商人撻之走入糞壤中不見今人正旦以細繩繫綿人投糞掃中云乞如願金虀玉膾吳郡獻松江鱸魚煬帝曰所謂金虀玉膾東南佳味也花記南部煙閃電窗帝觀書處窗户玲瓏相望金鋪玉觀輝映溢目號為閃電窗上同雲仙雜記卷之十
