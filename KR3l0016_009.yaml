front:
  text: 雲仙雜記卷之九
  hash: sha256:16311a9136f064262817cc5b3dc5668a787f14acff8026af8083c1e318ae29e1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0016_SBCK_009-1a}
body:
  text: 一杯羔三萬錢李徳𥙿奢侈每食一杯羔其費約錢三萬雜珠玉寳貝雄黄朱砂煎汁為之過三煎即棄其滓博異志縑繫南山樹明皇問富人王元寳家財多少對曰請以一縑繫陛下南山樹南山樹盡臣縑未窮博異志心織茟耕翰林盛事云王勃所至請託為文金帛豐積人謂心織茟耕北里志燕奴有術士於腕間出彈子二丸皆五色叱令變化即化雙燕飛騰名燕奴又令變即化二小劍交擊湏臾復為丸入腕中洞微志三斗爛腸殷洪逺云周旦腹中有三斗爛腸金樓子金菜玉𬞞始皇遣徐福入海求金菜玉𬞞并一寸椹無腸公子蟹曰無腸公子龜曰先知君駭雞犀通天犀中有白紋如絲者置米其上以飼雞雞見驚走名駭鷄犀刻為魚形持入水水輒開岀抱朴子天皷雷曰天皷雷神曰雷公抱扑子虎狼稱呼五君山中寅曰稱虞吏者虎也稱當路君者狼也稱東王父者麋也西王母者鹿也成陽公者狐也社君者鼠也抱朴子鵲巢獺穴鵲巢知風之所起獺穴知水之髙下暉日知晏鴆鳥也隂諧知雨䧳也岀淮南子靈運鬚謝靈運美鬚臨刑施南海祗洹寺為維摩詰鬚寺中寳惜中宗時安樂公主五日闘百草遣人取之仍剪棄其餘國史纂異没了期錢鏐封吳越王工役大興士卒嗟怨或夜書府門曰沒了期沒了期修城纔了又開池鏐出見之命吏書曰沒了期沒了期春衣纔了又冬衣嗟怨頓息五代史𥙷㧞釘錢趙在禮在宋州所為不法百姓苦之一日制下移鎮永興百姓相賀曰眼中㧞却釘矣可不快哉在禮聞之上表乞還鎮朝廷許之在禮每口率錢一千號㧞釘錢遂獲百萬同上釡中龍南唐時有蒼頭持龍水圖来貨或得之將練為衣忽釡中雲蒸起見二龍騰躍穿壁而去黄紙寫勑正觀中太宗詔用麻紙寫勑詔髙宗以白紙多䖝蛀尚書省頒下州縣並用黄紙食玉炊桂蘓秦之楚三日乃淂見王辭行王曰曽不少留對曰楚國食貴於玉薪貴於桂謁者難得見如鬼王難得見天帝臣食玉炊桂因鬼見帝王曰聞命矣戦國荣鷸蚌趙旦伐燕蘓代為燕謂惠王曰臣過易水蚌方出曝而鷸啄其肉蚌合而箝其啄鷸曰今日不雨明日不雨即有死蚌蚌曰今日不出明日不出必有死鷸両不相舎漁者得而并之同上釐婦魯人有獨處室者隣之釐婦寡媍也亦獨處夜暴風雨釐婦室壞趋而託焉魯人閉户曰男女不六十不閑居今子㓜吾亦㓜是以不敢納婦曰何不學栁下惠然嫗不逮門之女魯人曰下惠則可吾固不可吾將以吾之不可學下惠之可孔子家語螳螂搏輪齊荘公出獵有螳蜋舉足将搏其輪御曰北蟲知進而不知退不量力而輕就敵荘公曰以為人必為天下勇士矣於是廻車而避之而勇士㱕之同上銅鶴樽韓王元嘉有一銅鶴樽背上注酒則一足倚滿則正不滿則傾側朝野簽載鵲尾杓陳思王有鵲尾杓柄長而直置之酒樽凡王欲勸飲者呼之則尾指其人同上麒麟楦唐楊烱每呼朝士為麒麟楦或問之曰今假弄麒麟者必脩􅎖其形覆之驢上宛然異物及去其皮還是驢耳無徳而朱紫何以異是同上喙長三尺手重五斤陸餘慶為洛州長史善論事而繆於决判時嘲之曰說事即喙長三尺判事則手重五斤同上鶴鳴鷄樹鳳閣侍郎杜景儉文章知識並髙逺時號鶴鳴雞樹朝野簽載鳩集鳳池王及善才行庸猥為内史號鳩集鳳池岀朝野簽載金剛舞夜义歌隋諸葛昂髙瓉争為豪侈昻屈攅串長八赤餅濶丈餘餤麄如柱酒行自作金剛舞以送之瓉復屈昻以車行酒馬行肉碓斬鱠碾蒜虀自唱夜叉歌以送之朝野簽載金戺玉階明光殿金玉珠璣為簾箔金戺玉階晝夜光明在桂宫中三輔黄圖傳座長安風俗元日以後逓飲食相邀號傳座南部新書寳苖山中有葱下必有銀有薤下必有金有薑下必有錮錫山中有玉者木旁枝下垂謂之寳苖築糠三尺新羅人泛海漂􅑁鬼國鬼執之曰汝能与我築糠三尺乎汝欲鼻長一丈乎其人請築乆不成乃為鬼㧞其鼻如象酉陽雜爼飜綽入水玄宗甞令左右提翻綽入池水中復出曰向見屈原笑臣爾遭逢聖明何亦至此同上龍巢飜夷陵江或浮大木蔽塞水面土人謂之龍巣翻北夢瑣言見李思戒明宗不豫馮道入問因指果實曰如食桃不康他日見李思戒北夢瑣言一歩一計李克用入魏博覘之城上有旗幟来徃晉王曰劉鄩一歩一計更令審探果縛蒭為人縛旗於上以驢負之循城而行鄩軍遁已二日矣同上通神錢張延賞判度支有獄頗寃濫公召吏嚴戒旬日須了明日案上有小帖子曰錢三萬貫乞不問此獄公怒更促之明日帖子云五萬貫公亦怒明日復見帖子曰錢十萬貫遂止不問所親問之公曰錢至十萬通神矣無不可為之事吾懼及禍不得不止也幽閑皷吹九花虬代宗時范陽貢馬額髙九寸真虬龍也身被五花紋號九花虬後以賜郭子儀社陽雜編上清珠開元𥘉罽賔國王貢上清珠光照一室有仙人玉女雲鶴搖動其中有水旱兵革之災䖍視無不應驗同上副急淚宋世祖謂劉徳願曰卿哭貴妃悲者當厚賞徳願應聲慟哭撫膺擗踊涕泗交流上甚悅故用豫州刺史以賞之上又令醫術人羊志哭貴妃志亦嗚咽極悲他日有問志者曰卿那得此副急淚志曰我爾日自哭亡妾耳通鑑五花館荆南舊有五花館待賔之上地也故眩上成納詩曰不是上台怜姓字五花賔館敢従容南部新書烏龍㑹稽人張然滯役經年不歸婦與奴私通然養一狗名曰烏龍後然歸奴懼事覺欲謀殺然狗注睛視奴奴方興手烏龍盪奴奴失刀仗然取刀殺奴絶搜神記鬚髯如㦸山隂公主淫恣悅褚彦回以白帝帝召彦回西上閣宿十日公主夜就之備見逼迫彥回整身而立從夕至曉略不移志公主謂曰君鬚髯如㦸何無丈夫意彥回曰雖不敏何敢首為亂階通鑑田舎翁十斛麥李勣入見上問之曰朕欲立武昭儀為后禇遂良固執以為不可遂良既顧命大臣事當且已乎對曰此陛下家事何必更問外人上意遂决許敬宗宣言於朝曰田舎翁多收十斛麥尚欲易婦况天子立后何豫諸人事而妄生議乎同上赤鳳凰后所通宫奴燕赤鳳者雄捷能超樓閣兼通昭儀十月五日宫中故事上靈女朝吹塤擊鼓連臂踏歌赤鳳凰来曲后曰赤鳳凰為誰来昭儀曰赤鳳為姊来寜為他人乎后怒以杯擲昭儀裙曰鼠子能噬人乎昭儀曰穿其裙見其私足矣安在噬人乎帝微聞其事以問昭儀昭儀曰以漢家火德故以帝為赤鳳帝信之大悦趙后外傳雲仙雜記卷之九
