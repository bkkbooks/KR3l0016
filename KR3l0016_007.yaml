front:
  text: 雲仙雜記卷之七
  hash: sha256:0e74d135ade8ad328c117f389b39e77f3a120c35b2d5946875de7d6613b1e6ad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0016_SBCK_007-1a}
body:
  text: 元白兩不相下元微之白樂天兩不相下一日同詠李花微之先成曰葦綃開萬朵樂天乃服綃練也葦白而綃輕高隱外書仙人柏葉書郭天民巧思橫生能摺書蕳反覆如柏葉狀鄉人謂之仙人柏葉書安成記家庖百品張元厚家庖百品日日不變有蔡機缸二千盛貯皆滿梁福廬陵記硯中出白影珠矦道昌因雨置龜頭硯於簷下承溜以滌之俄而滴破硯硯中出白影珠十顆有患目者煮珠水洗之皆愈馮正雲金溪記陳蕃待客陳蕃待客拌飯以鹿脯芼羮以牛脯未嘗别為異饌董慎續豫章記桂人好食蝦蟆桂人好食蝦蟆仍重乾􅌲為糝赴食者至以餘爼包歸遺兒女雖汚衫不耻張洞林桂林志霜露能染紅紫鵝管山霜可染紫白庶潭露能染紅為天下冠恨人無知者常奉真相潭記蒲桃髻小兒髮初生為小髻十數其父母為兒女相勝之辭曰蒲桃髻十穗勝五穗李明之衡山記方囊盛金錢富人賈三折夜以方囊盛金錢於腰間微行市中買酒呼秦聲女置宴方德逺金陵記千眼仙人赴東林寺廬山逺法師命盡之日山中峰澗寺落皆見千眼仙人成隊執幡幢香花赴東林寺法師死乃止十三賢共注廬山記洛如花吳興山中有一樹類竹而有實似莢狀鄉人見之以問陸澄澄曰名洛如花郡有文士則生張寶就印録虱念阿房宫賦楊州蘇隱夜卧聞被下有數人齊念阿房宫賦聲緊而小急開被視之無他物惟得虱十餘其大如豆殺之即止清異志甲乙膏蜀人二月好以豉雜黃牛肉為甲乙膏非尊親厚知不得而預其家小兒三年一享浣花旅地志魚脊出金叉寶曆中酉陽人見釣魚師有魚腦貫黃文愛而買歸食至脊上出金叉一隻長六寸唐餘録團沙揑成睡嵇康房琯少時曽至洲渚上團沙揑成睡嵇康甚有摽態見者多愛之童子通神録樂音泉強村有水方寸許人𣣔取之唱浪淘沙一曲即得一杯味大井冷村人因名曰樂音泉玄山記石斧欲斫斷詩手杜甫子宗武以詩示阮兵曹兵曹答以石斧一具隨使并詩還之宗武曰斧父斤也兵曹使我呈父加斤削也俄而阮聞之曰誤矣欲子斫斷其手此手若存天下詩名又在杜家矣出文覽清水郎君司馬伯殊買得鴨卵一枚非常􅎇重夜猶未食夢曰此卵乃徐龍幼子清水郎君也不殺將富殊乃放之三峰集徐鳳儀杖徐鳯儀有一杖直如茟管其後每年生一莭二十年每年縮一莭三月則杖之四面青赤白黑各開一花不知何木也陶家瓶餘事劒生神芝則天下晏清成都朱善存家世寶一劍每生神芝則天下晏清如安史黃巢之亂劍皆吐黑煙屬天不差毫釐玉麈集聚芳圖百花帶宗測春遊山谷見奇花異草則係于帶上歸而圖其形狀名聚芳圖百花帶人多效之高士春秋李花如飛伍貫卿居沅陵家有李花一株月夜奴婢遙見花作數團如飛仙狀上天去花上露水倐然作雨數千點花則亡矣樞要録起藁窗上江揔為文次至吟詠得意則起藁於窗上不堪示則投置溷中久而文遂工矣文茟襟喉蜜浸烏梅解宿酲陳永陽王宿酲未解則為蜜浸烏梅每啖不下二十枚清醒乃已樵人直説榕粉小兒瘡痂以榕粉日傅之則易瘥而無痕出汗漫録灰山無棣有灰山山南有石竅其中二麥無數取之不極三賢典略嗜蛤蜊吐突承璀嗜蛤蜊炙以鐵絲床數澆鹿角漿然後食傳芳略記諢衣穆宗以玄綃白書素紗墨書為衣服賜承幸宫人皆淫鄙之詞時號諢衣至廣明中猶有存者史諱録三樣錢買二色酒西門季玄造二色酒白酒中有黑花斟於器中花亦不散其中有肝石故也崔道旅以金銀銅錢來酤曰以我三樣錢買君二色酒欲辭得乎常新録大筍中有眼睛裴晉公於藍田得一大筍破之有三四眼睛而香美過甚乃與曾序分食之晉公遺語雨點螺磨紙治紙之昏而不染墨者用雨點螺磨紙左右三千下其病去矣文房寶􅎖沈休文多病沈休文多病六月猶綿帽溫爐食薑椒飯不爾則委頓自慶集盲郭璞路巗幼病有人稱善醫禳之術巖用之不效歎曰此盲郭璞也搔首集淨眼僧傳法寺淨眼僧能用藥煮烏頭施人治百疾皆驗又以穢迹呪治痁破鐵城偈除鬼祟發無不捷僧園逸録竹莭中神水重午日午時有雨則急斫一竿竹竹莭中必有神水瀝取和獺肝為圓治心腹塊聚等病出金門歲莭釀換骨醪憲宗采鳳李花釀換骨醪晉國公平淮西回黃帊金瓶賜二斗敘聞録畏薯藥李輔國大畏薯藥或人因以示之必眼中火出毛髮皆瀝血因致大病叩頭録分香蓮三堂使宅有鈎仙池一種蓮子一嵗再結實子十隻其花時香兼桃梅萸菊郡人傳分香蓮不論錢三堂往事雪竹搔頭趙綸妻死遺雪竹搔頭於階下不數日化為楊梅花朵如撒時人異之姑臧前後記遇棊仙卞子京遇棊仙束帶拜金鑄紫堂仙仍坐於席上勝克之利萬不失一手參棊訣焚杜甫詩飲以膏蜜張籍取杜甫詩一帙焚取灰燼副以膏蜜頻飲之曰令吾肝腸從此改易詩源指訣藏盤筵於水底白氏履道里宅有池水可泛舟樂天每命賓客繞船以百十油囊懸酒炙沉水中隨船而行一物盡則左右又進之藏盤筵於水底也窮幽記七井生涼霍仙鳴别墅在龍門一室之中開七井皆以雕鏤木盤覆之夏月坐其上七井生涼不知暑氣雲林異景志雲仙雜記卷之七
