front:
  text: 刻雲仙雜記序梁任彦升家有書三萬卷捃拾遐怪之事為二卷曰述異记唐末時馮贄所纂雲仙雜記十卷贄自序云家蔵九世之書二十餘萬卷已數倍彦升之書雖古蔵書之家當無以過之今觀其所纂多所未見贄又云若見於常常之書此必畛之信矣其事顡皆幽间燕餙述異之外足以資博聞而欣然惬賞者此書也葉伯寅既乙校刻齋中𣸪屬余序遂為序云隆慶辛未夏六月俞允文撰雲􅋖雜記序
  hash: sha256:3e9b13f9146d152a7252b7a86e70f83360356088e45dfa3c155778c6109b39a5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0016_SBCK_000-1a}
body:
  text: 唐金城馮贄編纂類之書多矣其間所載世人用于文字者亦不下數十軰則今未免為陳言也予事科舉三十年蔑然無効天祐元年退㱕故里築選書室以居取九世所蓄典籍經史子集二十萬八千一百二十卷六千九百餘帙其膏髓别為一書其門目未暇派别也成于四年之秋由急於應文房之用乃不䏻詳又數歳復淂終萹者四部英華筆頭飛文壇戈㦸應題錄皆傳記集異之說若見於常常之書者此必略之庻兵火煨燼之後成者不至求手豈小𥙷欤同志者幸為􅎇秘之天復元年十二月序雲仙襍記目錄卷之一幽人茟飛雲履孫豋琴棋聲與律吕相應紅白二墨龍耳李磂黄椀夢裁錦無塵子惜春御史黑松使者桞神九烈君六鼻鏡生雲烟文星典吏玄山印記水玉數珠為梨花洗粧籠桶衫柿油巾石斧銘棠木印鳯窠群女地仙圓凉物梅粧閣洛陽歲莭􅏧檀寺春秋二㑹㮻首問青天清髙門戸午橋荘飬硯墨茟𥿄迷香洞袖裏春金凰凰三賢松芋魁遭遇山神以豐年相報綰龍臺呉興米掃露眀軒吞雲夢澤卷之二田水聲過吾師龍鬚友隱士衫俗耳鍼砭詩膓鼓吹半月履菱角巾大鯉五色烟姿玉骨日精火筯如両儀羔羊揮淚屋龍更衣掌有卧蛇文栗木為關九華半臂遷官靣長額有光氣壺中景辨琴秦楚聲臨光宴水松牌泛春渠百花獅子桃花𥿄酒器九品暖香滿室如春啼猿生蕨買春錢苦吟蛻龍牙碎金靣基盤琴價与武庫争先圍棋奪造化墨紋如履皮換茶醒酒腸胃文章映日天峰煤與綾文剌孰朦粥飼鳩花簮壓損㡌􅉉翡翠指環赤将軍地脂胡麻啖犬得意田卷之三過門錢虞永興書一醉六日𧺫宅刷以醇酒題梁字郇公厨厠上以术湯盥手書北山移文争春館薛家士風食蒲桃梅聘海棠棖子臣櫻桃檜生藥圎過􅈦羊軟􅃮壥桑枝為籬障嚼鷄舌香䏻詩朱書禹字渡江河盡數天星知棊勢雌雄樹作詩如繡花化玉膏貯蘭蕙百齒梳科斗筯魚尾匙唾地成文菖蒲當拜此君界尺茟槽犀如意萱艸浣衣虎毛紅管茟一詩輒洗其茟句中喜得魚竹洪兒𥿄束修羊惠一絲両絲蕨成金叙鷄鴨卵殻八梭綾染花奩文享媚香無忝少延淸歡茟文章貨降龍道者何徴君隱吳郡西昌逸士享􅎷肉獵蝇記室租𬞞助鼎爼蓄鴨卷之四石鼈銜賦題自負書劍松精成使者龍窠石召客念無魚金鷄抱卵時胡松莭支琴竊嚥棊子墨染𥿄不昏茶燋縛奴投火袖餅班中石蓮匣鵝蒸粉指印青編一里更二馬旋風茟贈相淂以鳩物價至微夜飛蟬羲之鬼竹枝曲却老先生小兒司命青蠅拜賀葬得石牌貧而圖婚以海鮫皮為鼓上元影燈軟棗餻竊花酒窟詩成裁囱𥿄白羊粧點芳草浮萍為鴨作茵褥自為小君裁剪貴家棊子弄葫蘆成詩好讀離騷挼花浸酒挑野𬞞簇酒祭詩以酒脯碬磨齋歛衣凌虗宴桃花醋蟣肝龍首卷之五茟描窻竹影糖蜜莫逆交印宫人臂念金輪呪水晶環渡舟鳴牙餅棠棣之好金蘭簿鴨邜成花燭闈宴客典斟金牌盈座聚香團待闕鴛鴦社咲春紅二花三鹿郡公崑崙玉盞坐間牡丹花杜䳌喚㱕遇河神口吻生花贈詩勝爛黄魚折筯不休防風粥食蝤蛑羣公對雪屋瓦皆鏤三年不見羊角採星盆作剪刀左撚巾拭靣碑石漬𥿄除夜歎老印普賢像三辰酒桑木根可作沉香想皂葢與日争功雷門四老石握麥芒刀字麒麟草魚藻洞鼻出黄膠數米而食廬墓日影為之不移飼牛以天麻飯髙麗絲結食牛肺犯天樞使菖蒲成獅子鸞鳯状鴨肝猪肚吞花卧酒􅒉椿不染風屋竅如七星斗麵為糊供緘封􅔇如棗核而中空卷之六讀書數真珠為記竹粉湯蜀中厚朴碎錦坊百年歌夢青龍吐棊經白眼蜂安石㨨嗜鴨腊壬癸席歛妓釵鈿以記意沈秘景符沙上玩味成詩吟詩落齒綠牝鞍鳯眼窻巨栗殻為盃眉分九聚洞天缺賜成象殿茶果夏雪價䓁金壁蛙臺棄官求道携琴就松風澗響出逰携圍棊短具墨難减者萬金不換孜茶三䓁笏囊笏架徐峰善棊瞬碧侯錢龍宴王武子好馬鸞手校尉剪刀􅔇月兒羔玄禄大雅之文二儀餅槐膠禅子酒神九芒珠石綠鏡臺自課庵淵眀拜火筆封九錫墨封九錫𥿄封九錫硯封九錫為花樹洗瘡止痛卷之七元白両不相下仙人栢葉書家庖百品硯中出白影珠陳蕃待客桂人好食蝦蟇霜露䏻染紅紫蒲桃髻方囊盛金錢千眼仙人赴東林寺洛如花虱念阿房宫賦甲乙膏魚脊出金釵團沙揑成睡嵇康樂音泉石斧欲斫斷詩手清水郎君徐鳯儀杖劍生神芝天下晏清聚芳圖百花帶李花如飛仙𧺫藁窻上蜜浸烏梅觧宿醒榕粉灰山嗜蛤蜊諢衣三様錢買二色酒大筍中有眼睛雨點螺磨𥿄沈休文多病畜郭璞浄眼僧竹莭中神水醸換骨膠畏薯藥分香蓮雪竹搔頭遇棊仙焚杜詩飲以膏蜜蔵盤筵於水底七井生凉卷之八八角玉井失去周字知唐必興曲江春逰毛詩卷染油代燭眉睫間常化佛好李花致富一物如人眼睛造笙喬敷嗜魚浮陽筍瓜甲間皆出雲烟石魚王毋惜李過蟠桃重黎盞酌水時元亨煉真孫逄年好酒老不衰王維居不容塵磁石盖眼魚喜􅎷胎香降魔寺僧以名召魚并代人喜嗜麫鶴識字洗心糖桃花絲秘宻泉怯夜幡魚鱉隨世安危書冊以竹􅃮為糊真脫絲布酒中沐浴毛髮識味龍口渠口中現五色牙齒李有九標斗盆燒乳頭香䑕精李猪肝中有䜟書酒魔糠市品物互徴古事卷之九一盃羔三萬錢縑繫南山樹心織茟耕燕奴三斗爛腸金菜玉𬞞無腸公子駭鷄犀天皷虎狼稱呼鵲巣獺穴靈運鬚沒了期㧞釘錢斧中龍黄𥿄寫敕金玉炊桂鷸蚌釐婦螳蜋搏輪銅鶴罇鵲尾杓麒麟楦喙長三尺手重五斤鶴鳴鷄樹鳩集鳯池金剛舞夜又歌金戺玉階傳座寳苗築糠三尺飜綽入水龍巢飜見李思戒一步一計通神錢九花虬上清珠副急淚五花館鳥龍鬚髯如㦸田舎翁十斛麥赤鳯凰卷之十蕤賔鐡截鐙留鞭蜂蝶慕香自煖盃龍牀九色鳯鶵懐夢艸青鸐寳井瓊厨金穴流香渠書倉如願金􅐽玉膾閃電窻雲仙雜記目錄終
