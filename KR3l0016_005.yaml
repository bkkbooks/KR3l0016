front:
  text: 雲仙雜記卷之五
  hash: sha256:2b360e674472b7f845523f9f7b49405aba40fe3786e7c004e4e640cd15588823
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0016_SBCK_005-1a}
body:
  text: 茟描窗竹影宗測樂間靜好松竹嘗見日篩竹影上窗以茟備描之常新録糖蜜莫逆交陳昉得蜀糖輒以蜜澆之曰與蜜本莫逆交傳芳略記風月常新印宫人臂明皇開元初宫人被進御者日印選以綢繆記印于臂上文曰風月常新印畢漬以桂紅膏則水洗色不退史諱録念金輪呪敲兩耳鐺服桂心丸念金輪呪則所思之人不以存沒是夜必夢見之事略水晶環渡舟蕭整嘗登陸渾沙洲忽水漲不得下急呼村童折麈尾水晶環與之渡舟而過三賢典誥鳴牙餅許康年謁劉遜贈遜鳴牙餅千枚曰雖微物也助厨中兩日之費退耕傳棠棣之好李初直遇與人相知則曰棠棣之好何以過此喜慶倍常敘聞録金蘭簿戴弘正每得蜜友一人則書于編蕳焚香告祖考號為金蘭簿宣武盛事鴨卵成花向聲能於鐺中以手撥鴨卯成花河中記燭圍韋涉家宴使每婢執一燭四靣行立人呼為燭圍長安後記宴客典斟陳無咎宴客一客用一婢典斟必十二斟而後使滿以盡誠敬之道洛都要記金牌盈座河間王夜飲妓女謳歌一曲下一金牌席終金牌盈座豐盈傳聚香團楊州太守仲端畏妻不敢延客謝廷皓謁之坐久飢甚端入內袖聚香團啖之楊州事邇待闕鴛鴦社朱子春未婚先開房室帷帳甚麗以待其事旁人謂之待闕鴛鴦社籹樓記笑春紅閬州參軍黃涉婢曰笑春紅死涉念之淚灑犀簾至皆損壞蜀普録二花阮文姬插鬢用杏花陶溥公呼曰二花河東備録三鹿郡公袁利見為性頑獷方棠謂袁生已封三鹿郡公蓋譏其太粗踈也幽燕記崑崘玉盞宇文卓方執崑崘玉盞聽左丞檀超髙談不覺墜地青州雜記坐間牡丹花宋旻語常帶華藻李孺安曰時方三月坐間生無數牡丹花矣鄴郡名録杜鵑喚歸石誼未娶聞杜鵑喚歸歎曰此物催人使歸使我何所歸耶金臺録遇河神顧希微開成二年遇河神屈莫多曰更二千年大江所在堤岸當崩沙九里禹功記口吻生花張祜苦吟妻孥喚之不譍以責祜祜曰吾方口吻生花豈恤汝輩白氏金鎖贈詩勝爛黃魚皇甫彚謁韓愈愈贈以詩彚退有言怒愈不為置酒愈曰豈不勝以爛黃魚待汝耶續鍾嶸句眼折筯不體山濤酒後哺啜折筯不休酒中玄防風粥白居易在翰林賜防風粥一甌剔取防風得五合餘食之口香七日金鑾密記食蝤蛑鹿宜孫食蝤蛑炙於夀陽碗中頓進數器止戈集羣公對雪羣公對雪尚隆之曰麵堆金井誰調湯餅吳永素曰玉滿天山難刻珮環坐間服其韻精姑臧記屋瓦皆鏤余宗伯屋瓦皆鏤竅穴千百雨則散如真珠用陳留瓦則堅而易􅍢三堂往事三年不見羊角皮蕃去北而復來鄱陽食竹笋曰三年不見羊角哀矣叩頭録採星盆嵇昌蓄採星盆夏月漬果則倍冷敘聞録作剪刀姑園鐵作剪刀以苜蓿根粉養之裁衣則盡成墨界不用人手而自行搔首集左撚巾拭面陽華用左撚巾拭面倍有光彩自慶傳碑石李輔國葬父碑石用豆屑一千團磨瑩如紫玉碑字四面鐫葵花三百朵晉公遺語漬紙以竹梢甘露和天南星漬𥿄一宿裁之刀去如飛文房寶􅎖除夜歎老裴度除夜歎老逮曉不寐爐中啇陸火凡數添也金門嵗莭印普賢象玄裝以回鋒𥿄印普賢象施于四衆每歲五馱無餘僧園逸録三辰酒玄宗置麴精潭砌以銀甎泥以石粉貯三辰酒一萬車以賜當制學士等史諱録桑木根可作沉香想裴休得桑木根曰若作沉香想之更無異相雖對沉水香反作桑根想終不聞香氣諸相從心起也常新録皂蓋能與日輪爭功韓愈刺潮州嘗暑中出張皂蓋歸而喜曰此物能與日輪爭功豈細事耶傳芳略記雷門四老石王維輞川林下坐用雷門四老石燈滅則石中鑽火事略握麥芒刁字牛僧孺進士時常握麥芒刁字有繆誤隨手刪割點定三賢典略麒麟草元和時館閣湯飲待學士者煎麒麟草鳯翔退耕傳魚藻洞魚朝恩有洞房四壁夾安琉璃板中貯江水及萍藻諸色蝦號魚藻洞南康記鼻出黃膠賀知章忽鼻出黃膠醫者謂飲酒之過從容録數米而食沈休文羸劣多病日數米而食羔不過一筯青陽記廬墓日影為之不移鄧寅廬墓墳土未乾日影為之不移壠上記飼牛以天麻飯青齊間遇春耕則飼牛以天麻飯仍用錦縷繫于角上耕桑偶記髙麗絲結張均妓多麗彈琵琶曲頂上有髙麗絲結趙詩爭奪致傷二指辨音集元夜食牛肺犯天樞使梁鄴上元後忽髮變如血卜曰元夜食牛肺犯天樞巡使夜行禱謝可免影燈記菖蒲成獅子鸞鳳狀僧普寂大好菖蒲房中以菖蒲種成獅子鸞鳳仙人之狀海墨微言鴨肝豬肚王縉飲酒非鴨肝豬肚筯輒不舉醉仙圖記吞花卧酒虞松方春以謂握月擔風且留後日吞花卧酒不可過時曲江春宴録庭椿不染風盧携夢人贈句曰若問登庸日庭椿不染風初不解其言後數年携拜相庭下古椿一㧣雖狂風驟雨不濕不搖鳯池編屋竅如七星鄭廣文屋室破漏自下望之竅如七星逄原記日用斗麵為糊以供緘封順宗時劉禹錫干預大權門吏接書尺日數千禹錫一一報謝緑珠盆中日用麵一斗為糊以供緘封宣武盛事麵如棗核而中空揚埏遊王鉷家食一物如棗核而中空其實麵也埏詢其法鉷笑而不言河中記雲仙雜記卷之五
