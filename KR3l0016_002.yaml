front:
  text: 雲仙雜記卷之二
  hash: sha256:b0bf76d2734cdcb8841f8261ef6a8151fbebbd01bde56f9e415014aadd54adc8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0016_SBCK_002-1a}
body:
  text: 田水聲過吾師丈人淵明嘗聞田水聲倚杖久聽歎曰秫稻已秀翠色染人時剖胸襟一洗荆棘此水過吾師丈人矣淵明别傳龍鬚友郤詵射榮苐一再拜其筆曰龍鬚友使我至此後有貴人遺金龜并拔蘂石簮咸與弟子曰可市筆三百管退而藏之貯以文錦一千年後猶當令子孫以名香禮之龍鬚志隱士衫成芳隱麥林山剝苧織布為短襴寬袖之衣著以酤酒自稱隱士衫梁福廬陵記俗耳針砭詩腸鼓吹戴顒春携雙柑斗酒人問何之曰往聽黃鸝聲此俗耳針砭詩腸鼓吹汝知之乎高隱外書半月履趙廷芝安成人作半月履裁千紋布為之托以精銀縝以絳蠟唐輔明過之奪取以貯酒已乃自飲廷芝問之答曰公器皿太微此履有滄海之積耳妙豐居士安成記菱角巾王鄰隱西山頂菱角巾又嘗就人買菱脫頂巾貯之嘗未遇而歎曰此巾名實相副矣董慎續豫章記大鯉五色孫願夜行橫塘見池中大魚映月吸水移時不去池外數步有一小坎正涵北斗有蝦蟇數十共來飲啜願異之明日汰池中惟有一大鯉身已五色復來坎所訪求蝦蟇得三足者數十馮王雲金溪記煙姿玉骨袁豐居宅後有六株梅開時為鄰屋煙氣所爍屋乃貧人所寄豐即圖泥塞竈張幕蔽風久之拆去其屋歎曰煙姿玉骨世外佳人但恨無傾城笑耳即使妓秋蟾出比之乃云可與比驅爭先然脂粉之徒正當在浚張洞林桂林志日精陸展郎中見楊梅嘆曰此果恐是日精然若無蜂兒採香誰勝難和之味即以竹絲籃貯千枚并茶花蜜送衡山道士常奉真湘潭記火筯如兩儀朱符謂火筯如兩儀成變化不可缺一本明大師在坐曰當以玉為之貴能不熱記李眀之衡山羔羊揮淚程皓以鐵床熁肉肥膏見火則油焰淋漓皓戲言曰羔羊揮淚矣又云我以三十萬錢償鐵匠而得此奉養豈不太過方德逺金陵記屋龍更衣饒子卿隱廬山康王谷無瓦屋代以茅茨每年一易茅謂之屋龍更衣或時雨濕致漏則以油幄承梁坐於其下初不愁歎記十三賢共注廬山掌有卧蛇文傅咸掌有卧蛇文指甲上隱起花草如雕刻是以文章過人逍遙公南康記栗木為關凡門以栗木為關者夜可以逺盜從容録九華半臂關文衍為散騎常侍畫九華山圖於白綾半臂號九華半臂自云令吾此身常在雲泉之內時逄青陽記遷官靣長額有光氣郭汾陽每遷官則靣長二寸額有光氣事巳乃復隴王書壺中景石崇砌上就苔蘚刻成百花飾以金玉曰壺中之景不過如是耕桑偶記辨琴秦楚聲李龜年至岐王宅聞琴聲曰此秦聲良久又曰此楚聲主人入問之則前彈者隴西沈妍也後彈者楊州薛滿二妓大服乃贈之破紅綃蟾酥麨龜年自負強取妍秦音琵琶捍撥而去辨音集臨光宴正月十五夜元宗於常春殿張臨光宴白鷺轉花黃龍吐水金鳬銀燕浮光洞攢星閣皆燈也奏月分光曲又撒閩江錦荔支千萬顆令宫人爭拾多者賞以紅圈帔緑暈衫影燈記水松牌李白遊慈恩寺寺僧用水松牌刷以吳膠粉捧乞新詩白為題訖僧獻玄沙鉢緑英梅檀香茟格蘭縑袴紫瓊霜海墨微言泛春渠汝陽王璡取雲夢石甃泛春渠以蓄酒作金銀龜魚浮沉其中為酌酒具自稱釀王兼麴部尚書醉仙圖記百花獅子曲江貴家遊賞則剪百花裝成獅子相送遺獅子有小連環欲送則以蜀錦流酥牽之唱曰春光且莫去留與醉人看曲江春宴録桃花紙楊炎在中書後閣糊窗用桃花紙塗以氷油取其明甚鳯池編酒器九品李適之有酒器九品蓬萊盞海川螺舞仙盞瓠子巵㡢捲荷金蕉葉玉蟾兒醉劉伶東𬈑樣蓬萊盞上有山象三島注酒以山沒為限舞仙盞有關捩酒滿則仙人出舞瑞香毬子落盞外逄原記暖香滿室如春寶雲溪有僧舍盛冬若客至則燃薪火暖香一炷滿室如春人歸更取餘燼雲林異景志啼猿生蕨猿啼之地蕨乃多有每啼一聲遽生萬莖窮幽記買春錢進士不苐者親知供酒肉費號買春錢承􅊭舊纂苦吟孟浩然眉毫一作毛盡落裴祐袖手衣袖至穿王維至走入醋甕皆苦吟者也詩源指訣蛻龍牙取蛻龍牙一枚手握之臨局自然機變橫出手參棊訣碎金面棋盤蘇尚書八十猶參禪大溈訪之以手拍碎金面棊盤尚書尋有悟解舊相禪學録琴價與武庫爭先嵇康抱琴訪山濤濤醉𣣔剖琴曰吾賣東陽舊業以得琴乞尚書令河輪珮玉截為徽貨所衣玉簾中單買縮絲為囊論其價與武庫爭先汝欲剖之吾從死矣金徽變化萹圍棊奪造化王勃圍棊率下四子成一首詩勃猶詫之向人曰吾材奪造化雖一時之間百用亦可棊天洞覽墨紋如履皮墨紋如履皮磨之有油暈者一兩可染三萬茟成老伯墨經換茶醒酒樂天方入關齊禹錫正病酒禹錫乃餽菊苖韲蘆蔔鮓換取樂天六班茶二囊以醒酒蠻甌志腸胃文章映日元稹為翰林丞旨朝退行鐘廊時初日映九英梅隙光射稹有氣勃勃然百僚望之曰豈腸胃文章映日可見乎常朝録天峰煤與綾文刺孰勝盧𣏌與馮盛相遇於道各携一囊𣏌發盛囊有墨一枚𣏌大笑盛正色曰天峰煤和針魚腦入金溪子手中録離騷古本比公日提綾文刺三百為名利奴顧當孰勝已而搜𣏌囊果是三百刺大唐龍髓記粥飼鳩藺先生坐琴莊食蘭香粥有鳩至階上先生以匙擲飼之漸進至肩遂盡此粥後日鳩以千百至先生皆飼之琴莊美事花簪壓損帽簷梁緒梨花時折花簮之壓損帽簷至頭不能舉祥雪志翡翠指環何充妓於後閣以翡翠指環換刺繡筆充知嘆曰此物洞仙與吾欲保長年之好乃令蒼頭急以蜻蜓帽贖之粧樓記赤將軍哥舒翰有馬曰赤將軍翰愛之甚常以朝章加其背曰過吾北林兒逺矣此駿材也馬癖記地脂髙展為並門判官一日見砌間沫出以手撮之試塗一老吏面上皺皮頓改如少年色展以謂必神藥問承天道士答曰此名地脂食之不死展乃發甎已無所覩方鎮編年胡麻啖犬以胡麻麨啖犬則光黑而駿使獵必大獲狐兔又可得三十歲好事集得意田雲陽假氏值豐年則盡取金錢埋之九里皆滿曰有得意田遂可棄無用金豐年録雲仙雜記卷之二
